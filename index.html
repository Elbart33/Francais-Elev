<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Français">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Français Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--bg2:#0C0C0E;--bg3:#1C1C1E;--bg4:#2C2C2E;--bg5:#3A3A3C;--text:#FFF;--text2:rgba(255,255,255,.75);--text3:rgba(255,255,255,.4);--accent:#5E5CE6;--accent2:#BF5AF2;--gold:#FFD60A;--green:#30D158;--red:#FF453A;--blue:#0A84FF;--orange:#FF9F0A;--border:rgba(255,255,255,.08);--glass:rgba(255,255,255,.04);--radius:20px;--radius-sm:12px}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;overflow:hidden;height:100%;overscroll-behavior:none}
#root{height:100%}
.app{max-width:430px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.nav-bar{background:rgba(0,0,0,.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:8px 0 max(20px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;flex-shrink:0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color .2s}
.nav-item.active{color:var(--text)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:500}
.card{background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.word-hero{margin:16px;border-radius:28px;overflow:hidden;position:relative;min-height:200px;background:linear-gradient(145deg,#1a1a2e,#16213e,#0f3460);border:1px solid rgba(94,92,230,.3);cursor:pointer}
.word-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(94,92,230,.3),transparent 70%);border-radius:50%}
.word-hero-content{padding:24px;position:relative;z-index:1}
.word-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(94,92,230,.2);border:1px solid rgba(94,92,230,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#8B8EFF;margin-bottom:14px}
.french-word{font-size:38px;font-weight:700;line-height:1.1;margin-bottom:6px}
.transliteration{font-size:17px;color:var(--text2);font-style:italic;margin-bottom:12px;font-family:'Playfair Display',serif}
.definition-text{font-size:13px;color:var(--text2);line-height:1.5}
.tag{display:inline-flex;align-items:center;background:var(--bg4);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--text2)}
.section{padding:0 16px;margin-bottom:18px}
.section-title{font-size:20px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 16px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:13px;color:var(--text3);font-weight:500}
.detail-value{font-size:13px;color:var(--text);text-align:left;max-width:65%;line-height:1.4}
.example-card{background:var(--bg4);border-radius:14px;padding:14px;margin-bottom:10px;font-size:15px;line-height:1.6;border-left:3px solid var(--accent)}
.srs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
.srs-btn{border:none;border-radius:14px;padding:14px 8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.srs-btn:active{transform:scale(.95)}
.srs-btn .srs-icon{font-size:20px}
.srs-btn.unknown{background:rgba(255,69,58,.15);color:#FF453A;border:1px solid rgba(255,69,58,.25)}
.srs-btn.medium{background:rgba(255,159,10,.15);color:#FF9F0A;border:1px solid rgba(255,159,10,.25)}
.srs-btn.known{background:rgba(48,209,88,.15);color:#30D158;border:1px solid rgba(48,209,88,.25)}
.progress-bar-bg{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.level-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid currentColor;opacity:.9}
.diff-dots{display:flex;gap:3px}
.diff-dot{width:6px;height:6px;border-radius:50%;background:var(--bg5)}
.diff-dot.filled{background:var(--accent)}
.quiz-option{background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;font-size:14px;transition:all .2s}
.quiz-option:active{transform:scale(.98)}
.quiz-option.correct{border-color:var(--green);background:rgba(48,209,88,.08);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(255,69,58,.08);color:var(--red)}
.stat-block{flex:1;background:var(--bg3);border-radius:16px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.search-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);width:100%;outline:none}
.search-bar::placeholder{color:var(--text3)}
.immersion-word{background:rgba(94,92,230,.15);border-bottom:1.5px solid var(--accent);cursor:pointer;border-radius:2px}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg3);color:var(--text2);white-space:nowrap}
.chip.active{border-color:var(--accent);background:rgba(94,92,230,.15);color:var(--text)}
.word-list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.word-list-item:active{background:var(--glass)}
.word-list-item:last-child{border-bottom:none}
.word-list-left{display:flex;align-items:center;gap:12px}
.word-french-sm{font-size:20px;font-weight:600}
.word-translit-sm{font-size:12px;color:var(--text3);margin-top:1px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;color:var(--text)}
.word-detail-header{padding:20px 16px 0;display:flex;align-items:center;gap:12px}
.sep{height:1px;background:var(--border);margin:0 16px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
.fade-up{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;animation:fadeUp .3s ease;white-space:nowrap}
.install-tip{margin:12px 16px;background:rgba(94,92,230,.08);border:1px solid rgba(94,92,230,.2);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.6}
.install-tip strong{color:var(--text2)}
.tip-darija{background:rgba(191,90,242,.08);border:1px solid rgba(191,90,242,.2);border-radius:14px;padding:12px 16px;margin:12px 0;font-size:13px;color:var(--text2);line-height:1.6;direction:rtl;text-align:right}
.tip-darija::before{content:'💡 ';font-size:15px}
</style>
</head>

<script>
const{useState,useEffect,useRef,useCallback,useMemo}=React;

const VOCABULARY = [
{id:1,arabic:"Éloquence",transliteration:"e-lok-wans",definition:"Art de bien parler, de persuader par un discours fluide.",nuance:"L'éloquence est une compétence qui se cultive. Elle ne se limite pas à un langage soutenu.",register:"Soutenu · Littéraire",origin:"Latin",frequency:"Courant",difficulty:3,category:"littérature",synonyms:["Art oratoire","Fluidité"],antonyms:["Bafouillage","Lourdeur"],examples:["L'éloquence de ce discours a conquis tout le public.","Un bon débat nécessite de l'éloquence."],errors:"Ne pas confondre 'éloquence' et 'verbeux'.",level:"B2",tip_darija:"هاد الكلمة كتستعمل فالنقاشات الرسمية."},
{id:2,arabic:"Pertinent",transliteration:"per-ti-nan",definition:"Qui est en rapport parfait avec le sujet.",nuance:"Une remarque pertinente est une remarque qui tombe juste.",register:"Professionnel",origin:"Latin",frequency:"Très courant",difficulty:2,category:"travail",synonyms:["Opportun","Judicieux"],antonyms:["Hors sujet","Inopportun"],examples:["Ta question est très pertinente.","Dans un entretien, il faut donner des exemples pertinents."],errors:"On dit 'une remarque pertinente' et non 'pertinante'.",level:"B1",tip_darija:"هاذ الكلمة كتجي بزاف فالمقابلات."},
{id:3,arabic:"Nuancer",transliteration:"nu-an-se",definition:"Exprimer avec précision en tenant compte des différences subtiles.",nuance:"Nuancer une opinion, c'est ne pas la voir en noir et blanc.",register:"Intellectuel",origin:"Français",frequency:"Courant",difficulty:3,category:"pensée critique",synonyms:["Modérer","Préciser"],antonyms:["Généraliser","Simplifier"],examples:["Il faut nuancer ce propos.","Son discours nuancé a été très apprécié."],errors:"Nuancer ne signifie pas 'contredire'.",level:"B2",tip_darija:"فاش كتخاصم واحد، حاول تnuance كلامك."},
{id:4,arabic:"Ambigüité",transliteration:"an-bi-gui-te",definition:"Caractère de ce qui peut avoir plusieurs sens.",nuance:"L'ambigüité peut être voulue ou involontaire.",register:"Débat",origin:"Latin",frequency:"Courant",difficulty:3,category:"débat",synonyms:["Flou","Équivoque"],antonyms:["Clarté","Précision"],examples:["L'ambigüité de cette phrase prête à confusion.","Il y a une certaine ambigüité dans ses intentions."],errors:"Attention à l'orthographe : 'ambigüité' avec un tréma.",level:"B2",tip_darija:"هاد الكلمة كاتكتب بالtréma فوق الu."},
{id:5,arabic:"Vulnérabilité",transliteration:"vul-ne-ra-bi-li-te",definition:"Caractère de ce qui est fragile, qui peut être facilement blessé.",nuance:"La vulnérabilité n'est pas une faiblesse. C'est une force.",register:"Psychologie",origin:"Latin",frequency:"Très courant",difficulty:3,category:"psychologie",synonyms:["Fragilité","Sensibilité"],antonyms:["Invulnérabilité","Force"],examples:["Montrer sa vulnérabilité est un signe de courage.","La vulnérabilité affective est un thème récurrent."],errors:"Ne pas utiliser pour décrire une simple faiblesse physique.",level:"B2",tip_darija:"الضعف ماشي عيب. بالعكس، هو قوة."},
{id:6,arabic:"Mérite",transliteration:"me-rit",definition:"Ce qui rend quelqu'un digne d'estime.",nuance:"Le mérite est souvent opposé à la chance ou au privilège.",register:"Société",origin:"Latin",frequency:"Courant",difficulty:2,category:"société",synonyms:["Valeur","Qualité"],antonyms:["Indignité","Déshonneur"],examples:["Il a obtenu cette place à force de mérite.","On lui reconnaît le mérite de son travail."],errors:"Ne pas confondre 'mérite' et 'arrogance'.",level:"B1",tip_darija:"هاد الكلمة هي عكس 'الواسطة'."},
{id:7,arabic:"Hésitation",transliteration:"e-zi-ta-syon",definition:"État de quelqu'un qui ne peut pas se décider.",nuance:"L'hésitation peut être le signe d'une réflexion profonde ou d'un manque de confiance.",register:"Psychologie",origin:"Latin",frequency:"Très fréquent",difficulty:1,category:"psychologie",synonyms:["Indécision","Doute"],antonyms:["Décision","Assurance"],examples:["Son hésitation a fait rater le train.","Après une brève hésitation, il a choisi."],errors:"Hésitation ne signifie pas 'paresse'.",level:"B1",tip_darija:"التردد كيتعلق بالتفكير، ماشي بالكسل."},
{id:8,arabic:"Appartenance",transliteration:"a-par-te-nans",definition:"Sentiment d'être membre d'un groupe.",nuance:"L'appartenance est un besoin humain fondamental.",register:"Société",origin:"Français",frequency:"Fréquent",difficulty:2,category:"société",synonyms:["Identité","Affiliation"],antonyms:["Exclusion","Solitude"],examples:["Le sentiment d'appartenance à une équipe est important.","Il recherche un sentiment d'appartenance."],errors:"Ne pas confondre 'appartenance' et 'identité'.",level:"B2",tip_darija:"الشعور بالانتماء ضروري للراحة النفسية."},
{id:9,arabic:"Élitisme",transliteration:"e-li-tism",definition:"Attitude qui privilégie une élite.",nuance:"Le mot est souvent utilisé de manière critique.",register:"Critique sociale",origin:"Français",frequency:"Courant",difficulty:4,category:"politique",synonyms:["Arrogance sociale","Condescendance"],antonyms:["Populisme","Humilité"],examples:["On lui reproche son élitisme.","L'élitisme peut être un frein à la diversité."],errors:"Ne pas confondre l'élitisme avec la 'méritocratie'.",level:"C1",tip_darija:"هاد الكلمة كاتستعمل فالنقاشات السياسية."},
{id:10,arabic:"Projection",transliteration:"pro-jek-syon",definition:"Mécanisme par lequel on attribue à l'autre ses propres sentiments.",nuance:"La projection est un mécanisme de défense inconscient.",register:"Psychologie",origin:"Latin",frequency:"Montant",difficulty:4,category:"psychologie",synonyms:["Attribution","Transfert"],antonyms:["Introspection","Auto-analyse"],examples:["Il fait de la projection : il accuse les autres.","La projection est un mécanisme de défense courant."],errors:"La projection est un processus inconscient.",level:"C1",tip_darija:"كيعني أنك ترمي عتابك على الناس."},
{id:11,arabic:"Ambition",transliteration:"an-bi-syon",definition:"Désir ardent de réussir.",nuance:"L'ambition est généralement positive. Une ambition démesurée peut devenir négative.",register:"Développement personnel",origin:"Latin",frequency:"Très courant",difficulty:1,category:"personnalité",synonyms:["Aspiration","Détermination"],antonyms:["Résignation","Passivité"],examples:["Sa grande ambition est de devenir architecte.","L'ambition est une qualité dans le monde professionnel."],errors:"L'ambition n'est pas un défaut en soi.",level:"B1",tip_darija:"الطموح صفة كاتعجب الناس."},
{id:12,arabic:"Rationalisation",transliteration:"ra-syo-na-li-za-syon",definition:"Action de justifier ses actes par des raisons logiques.",nuance:"En psychologie, c'est un mécanisme de défense.",register:"Psychologie",origin:"Latin",frequency:"Fréquent",difficulty:3,category:"psychologie",synonyms:["Justification","Excuse"],antonyms:["Remise en question","Assomption"],examples:["Il trouve toujours une rationalisation pour justifier ses retards.","Arrête de rationaliser et assume tes erreurs."],errors:"Ne pas confondre 'rationalisation' et 'raisonnement'.",level:"B2",tip_darija:"كاتعني التفكير المنطقي باش تبرر شي حاجة."},
{id:13,arabic:"Limites",transliteration:"li-mit",definition:"Frontières, ce qu'on ne peut pas dépasser.",nuance:"Dans les relations humaines, les limites sont essentielles.",register:"Relations",origin:"Latin",frequency:"Très courant",difficulty:1,category:"relations humaines",synonyms:["Frontières","Bornes"],antonyms:["Liberté totale","Permissivité"],examples:["Il est important de poser des limites.","Elle a dépassé les limites de la politesse."],errors:"On dit 'poser des limites' et non 'mettre des limites'.",level:"B1",tip_darija:"الحدود هي احترام الذات."},
{id:14,arabic:"Discours",transliteration:"dis-kour",definition:"Ensemble cohérent de paroles sur un sujet.",nuance:"Le discours est aussi la manière dont une institution s'exprime.",register:"Politique",origin:"Latin",frequency:"Fréquent",difficulty:4,category:"politique",synonyms:["Propos","Prise de parole"],antonyms:[],examples:["Le discours politique est souvent éloigné de la réalité.","Son discours est convaincant."],errors:"Ne pas confondre 'discours' et 'speech'.",level:"C1",tip_darija:"الخطاب هو مجموعة أفكار."},
{id:15,arabic:"Dérive",transliteration:"de-riv",definition:"Écart progressif par rapport à une norme.",nuance:"La dérive est insidieuse. Elle se fait petit à petit.",register:"Philosophie",origin:"Latin",frequency:"Courant",difficulty:4,category:"philosophie",synonyms:["Déviation","Égarement"],antonyms:["Stabilité","Rigidité"],examples:["On assiste à une dérive des valeurs.","Cette politique est une dérive dangereuse."],errors:"La dérive est un processus graduel.",level:"C1",tip_darija:"كاتعني التدهور التدريجي."},
{id:16,arabic:"Empathie",transliteration:"em-pa-ti",definition:"Capacité à comprendre et partager les émotions d'autrui.",nuance:"L'empathie va au-delà de la simple sympathie.",register:"Psychologie",origin:"Grec",frequency:"Très courant",difficulty:2,category:"psychologie",synonyms:["Compréhension","Sensibilité"],antonyms:["Indifférence","Apathie"],examples:["L'empathie est une compétence qui se développe.","Montrer de l'empathie apaise les conflits."],errors:"Ne pas confondre 'empathie' et 'sympathie'.",level:"B2",tip_darija:"التعاطف هو أنك تفهم وتحس بلي كيعيشو الآخر."},
{id:17,arabic:"Autonomie",transliteration:"o-to-no-mi",definition:"Capacité de se gouverner soi-même.",nuance:"L'autonomie est une valeur forte dans les sociétés modernes.",register:"Développement personnel",origin:"Grec",frequency:"Courant",difficulty:2,category:"personnalité",synonyms:["Indépendance","Liberté"],antonyms:["Dépendance","Soumission"],examples:["L'autonomie est un objectif éducatif.","Il a gagné son autonomie financière."],errors:"L'autonomie n'est pas l'isolement.",level:"B1",tip_darija:"الاستقلالية هي القدرة على القرار."},
{id:18,arabic:"Autonomisation",transliteration:"o-to-no-mi-za-syon",definition:"Processus qui permet à une personne de gagner en autonomie.",nuance:"Autonomiser les femmes, les jeunes, c'est leur donner les moyens d'agir.",register:"Société",origin:"Français",frequency:"Fréquent",difficulty:3,category:"société",synonyms:["Émancipation","Responsabilisation"],antonyms:["Dépendance","Soumission"],examples:["L'autonomisation des femmes est un combat.","Ce programme vise l'autonomisation des jeunes."],errors:"Autonomisation n'est pas synonyme d'isolement.",level:"B2",tip_darija:"التمكين هو أن تعطي للآخر القوة والثقة."},
{id:19,arabic:"Discipline",transliteration:"di-si-plin",definition:"Capacité à suivre des règles, une méthode.",nuance:"La discipline peut être imposée ou choisie. C'est une qualité essentielle.",register:"Développement personnel",origin:"Latin",frequency:"Très courant",difficulty:1,category:"personnalité",synonyms:["Rigueur","Auto-contrôle"],antonyms:["Indiscipline","Laisser-aller"],examples:["La discipline est la clé du succès.","Il a une grande discipline de travail."],errors:"La discipline n'est pas une punition.",level:"B1",tip_darija:"الانضباط هو تنظيم نفسك."},
{id:20,arabic:"Responsabilité",transliteration:"res-pon-sa-bi-li-te",definition:"Obligation de répondre de ses actes.",nuance:"Un adulte responsable assume les conséquences de ses choix.",register:"Psychologie",origin:"Latin",frequency:"Très fréquent",difficulty:1,category:"psychologie",synonyms:["Charge","Obligation"],antonyms:["Irresponsabilité","Impunité"],examples:["Il assume la responsabilité de son échec.","C'est une lourde responsabilité."],errors:"La responsabilité n'est pas la culpabilité.",level:"B1",tip_darija:"المسؤولية هي أنك تتحمل عواقب أفعالك."},
{id:21,arabic:"Tolérance",transliteration:"to-le-rans",definition:"Acceptation des opinions, des croyances différentes.",nuance:"La tolérance est une valeur fondamentale des sociétés démocratiques.",register:"Société",origin:"Latin",frequency:"Courant",difficulty:2,category:"société",synonyms:["Ouverture d'esprit","Largeur de vue"],antonyms:["Intolérance","Sectarisme"],examples:["La tolérance est le fondement de la paix sociale.","Il fait preuve d'une grande tolérance."],errors:"La tolérance n'est pas la faiblesse.",level:"B2",tip_darija:"التسامح هو اختيار واع باش تحترم اختلافات الآخرين."},
{id:22,arabic:"Durabilité",transliteration:"du-ra-bi-li-te",definition:"Capacité à durer dans le temps.",nuance:"La durabilité est au cœur des préoccupations écologiques et économiques.",register:"Écologie",origin:"Français",frequency:"Montant",difficulty:3,category:"société",synonyms:["Pérennité","Continuité"],antonyms:["Précarité","Éphémère"],examples:["La durabilité est un enjeu majeur.","Il faut investir dans des solutions durables."],errors:"La durabilité ne se limite pas à l'écologie.",level:"B2",tip_darija:"كاتستعمل بزاف فالنقاشات البيئية."},
{id:23,arabic:"Transparence",transliteration:"tran-spa-rans",definition:"Caractère de ce qui est clair, sans dissimulation.",nuance:"La transparence est une qualité très valorisée dans les institutions.",register:"Politique",origin:"Latin",frequency:"Fréquent",difficulty:3,category:"politique",synonyms:["Clarté","Loyauté"],antonyms:["Opacité","Dissimulation"],examples:["On exige plus de transparence.","La transparence est gage de confiance."],errors:"La transparence n'est pas la naïveté.",level:"B2",tip_darija:"الشفافية هي الوضوح في التعامل."},
{id:24,arabic:"Intégrité",transliteration:"in-te-gri-te",definition:"Qualité de quelqu'un qui agit avec honnêteté.",nuance:"Une personne intègre ne transige pas sur ses principes.",register:"Éthique",origin:"Latin",frequency:"Courant",difficulty:3,category:"éthique",synonyms:["Honnêteté","Droiture"],antonyms:["Corruption","Malhonnêteté"],examples:["Son intégrité professionnelle est reconnue.","Il a refusé le pot-de-vin par intégrité."],errors:"L'intégrité ne se réduit pas à la probité financière.",level:"B2",tip_darija:"النزاهة هي أنك تبقى صادق حتى كيما أحد ما شافك."},
{id:25,arabic:"Compétence",transliteration:"kom-pe-tans",definition:"Capacité reconnue à accomplir une tâche.",nuance:"La compétence désigne à la fois le savoir-faire et le savoir-être.",register:"Travail",origin:"Latin",frequency:"Très fréquent",difficulty:2,category:"travail",synonyms:["Habileté","Qualification"],antonyms:["Incompétence","Incapacité"],examples:["Ses compétences en gestion sont appréciées.","On recrute sur la base des compétences."],errors:"La compétence n'est pas innée.",level:"B1",tip_darija:"الكفاءة هي المهارة. كاتكتسب بالممارسة."}
{id:26,arabic:"Exclusion",transliteration:"eks-klu-zyon",definition:"Action de rejeter, d'écarter quelqu'un d'un groupe.",nuance:"L'exclusion est un phénomène social grave.",register:"Société",origin:"Latin",frequency:"Fréquent",difficulty:3,category:"société",synonyms:["Rejet","Mise à l'écart"],antonyms:["Inclusion","Intégration"],examples:["L'exclusion sociale touche les plus vulnérables.","Il a vécu une situation d'exclusion."],errors:"L'exclusion est souvent un processus actif.",level:"B2",tip_darija:"الإقصاء هو أنك تبعّد شي واحد بشكل متعمد."},
{id:27,arabic:"Marginalisation",transliteration:"mar-ji-na-li-za-syon",definition:"Fait de reléguer un individu à la périphérie.",nuance:"La marginalisation est souvent plus passive que l'exclusion.",register:"Société",origin:"Français",frequency:"Fréquent",difficulty:3,category:"société",synonyms:["Mise au banc","Relégation"],antonyms:["Insertion","Participation"],examples:["La marginalisation des jeunes est une réalité.","Les politiques contre la marginalisation sont insuffisantes."],errors:"La marginalisation est souvent un processus structurel.",level:"B2",tip_darija:"التهميش هو الإقصاء الغير مباشر."},
{id:28,arabic:"Aliénation",transliteration:"a-lye-na-syon",definition:"Sentiment d'être étranger à soi-même.",nuance:"L'aliénation est un concept philosophique et psychologique profond.",register:"Philosophie",origin:"Latin",frequency:"Rare",difficulty:4,category:"psychologie",synonyms:["Étrangeté","Dépossession"],antonyms:["Appartenance","Épanouissement"],examples:["L'aliénation du travail est une réalité.","Il ressent une profonde aliénation."],errors:"L'aliénation ne se limite pas à l'exil géographique.",level:"C1",tip_darija:"الاغتراب هو شعور بالغربة حتى فبلادك."},
{id:29,arabic:"Banalisation",transliteration:"ba-na-li-za-syon",definition:"Fait de rendre banal ce qui ne devrait pas l'être.",nuance:"La banalisation est souvent utilisée pour décrire un phénomène inquiétant.",register:"Société",origin:"Français",frequency:"Courant",difficulty:3,category:"société",synonyms:["Normalisation","Tolérance excessive"],antonyms:["Dénonciation","Résistance"],examples:["On assiste à une banalisation de la violence.","La banalisation des incivilités est préoccupante."],errors:"La banalisation est un processus progressif.",level:"B2",tip_darija:"التطبيع هو أن شي حاجة غريبة تتحول لعادية."},
{id:30,arabic:"Polarisation",transliteration:"po-la-ri-za-syon",definition:"Division en deux camps opposés.",nuance:"La polarisation est très présente dans le débat politique et sur les réseaux sociaux.",register:"Politique",origin:"Français",frequency:"Fréquent",difficulty:4,category:"politique",synonyms:["Clivage","Division"],antonyms:["Consensus","Modération"],examples:["La polarisation du débat public est inquiétante.","Les réseaux sociaux accentuent la polarisation."],errors:"La polarisation est un phénomène de groupe.",level:"C1",tip_darija:"الاستقطاب هو الإنقسام لجوج قطبيين."},
{id:31,arabic:"Solidarité",transliteration:"so-li-da-ri-te",definition:"Lien d'entraide et de soutien mutuel.",nuance:"La solidarité est une valeur fondamentale. Elle peut être spontanée ou organisée.",register:"Société",origin:"Français",frequency:"Très courant",difficulty:1,category:"société",synonyms:["Entraide","Fraternité"],antonyms:["Individualisme","Égoïsme"],examples:["La solidarité s'est manifestée après l'ouragan.","La solidarité est un rempart contre l'exclusion."],errors:"La solidarité n'est pas la charité.",level:"B1",tip_darija:"التضامن هو التآزر."},
{id:32,arabic:"Rente",transliteration:"rant",definition:"Revenu perçu sans effort productif.",nuance:"Le terme est souvent critique. Il désigne une situation où l'on gagne de l'argent sans travailler.",register:"Économie",origin:"Français",frequency:"Courant",difficulty:4,category:"économie",synonyms:["Privilège","Revenu passif"],antonyms:["Travail","Production"],examples:["Certaines entreprises vivent de la rente.","La rente immobilière est un sujet de débat."],errors:"La rente a une connotation négative.",level:"C1",tip_darija:"الريع هو المال اللي كايجي بلا خدمة."},
{id:33,arabic:"Corruption",transliteration:"ko-rup-syon",definition:"Abus de pouvoir ou de fonction pour un gain personnel.",nuance:"La corruption est un fléau dans de nombreux pays. Elle peut être politique, administrative ou morale.",register:"Politique",origin:"Latin",frequency:"Très fréquent",difficulty:2,category:"politique",synonyms:["Pots-de-vin","Détournement"],antonyms:["Intégrité","Probité"],examples:["La corruption est un obstacle au développement.","Il a été accusé de corruption."],errors:"La corruption ne se limite pas aux grands scandales.",level:"B2",tip_darija:"الفساد هو استغلال المنصب."},
{id:34,arabic:"Réforme",transliteration:"re-form",definition:"Changement structuré visant à améliorer un système.",nuance:"La réforme est souvent débattue en politique. Elle est présentée comme une amélioration.",register:"Politique",origin:"Latin",frequency:"Fréquent",difficulty:2,category:"politique",synonyms:["Changement","Modernisation"],antonyms:["Conservatisme","Statut quo"],examples:["La réforme de l'éducation est en cours.","Il a proposé une réforme ambitieuse."],errors:"Une réforme n'est pas un simple changement.",level:"B2",tip_darija:"الإصلاح هو تغيير هيكلي."},
{id:35,arabic:"Bureaucratie",transliteration:"by-ro-kra-si",definition:"Administration caractérisée par des procédures lourdes.",nuance:"La bureaucratie est souvent critiquée pour sa lenteur et sa rigidité.",register:"Administration",origin:"Français",frequency:"Très courant",difficulty:2,category:"économie",synonyms:["Administration lourde","Paperasserie"],antonyms:["Simplification","Flexibilité"],examples:["La bureaucratie décourage les investisseurs.","Il a passé des heures à lutter contre la bureaucratie."],errors:"La bureaucratie désigne un système, pas un simple employé.",level:"B2",tip_darija:"البيروقراطية هي الروتين الإداري."},
{id:36,arabic:"Autosuffisance",transliteration:"o-to-sy-fi-zans",definition:"Capacité à subvenir à ses propres besoins.",nuance:"L'autosuffisance est souvent un objectif individuel ou collectif.",register:"Économie",origin:"Français",frequency:"Courant",difficulty:3,category:"économie",synonyms:["Indépendance","Autonomie"],antonyms:["Dépendance","Assistance"],examples:["Il recherche l'autosuffisance énergétique.","L'autosuffisance alimentaire est un enjeu stratégique."],errors:"L'autosuffisance ne signifie pas l'isolement.",level:"B2",tip_darija:"الكفاية الذاتية هي أنك تكون معتمد على نفسك."},
{id:37,arabic:"Identité numérique",transliteration:"i-dan-ti-te nu-me-rik",definition:"L'ensemble des traces d'une personne sur Internet.",nuance:"L'identité numérique est une notion de plus en plus importante. Elle est construite par nos activités en ligne.",register:"Numérique",origin:"Anglais",frequency:"Montant",difficulty:3,category:"numérique",synonyms:["Empreinte numérique","Présence en ligne"],antonyms:["Vie privée","Anonymat"],examples:["Il faut gérer son identité numérique avec soin.","L'identité numérique peut vous ouvrir des portes."],errors:"L'identité numérique est une construction.",level:"B2",tip_darija:"هويتك الرقمية هي صورتك على الانترنت."},
{id:38,arabic:"Addiction numérique",transliteration:"a-dik-syon nu-me-rik",definition:"Dépendance excessive aux écrans et aux réseaux sociaux.",nuance:"L'addiction numérique est un trouble comportemental reconnu.",register:"Psychologie",origin:"Anglais",frequency:"Très courant",difficulty:2,category:"numérique",synonyms:["Cyberaddiction","Nomophobie"],antonyms:["Déconnexion","Modération"],examples:["L'addiction numérique touche de plus en plus de jeunes.","Il a reconnu son addiction numérique."],errors:"L'addiction numérique est une vraie addiction.",level:"B2",tip_darija:"الإدمان الرقمي خطر على الصحة النفسية."},
{id:39,arabic:"Autocensure",transliteration:"o-to-san-syr",definition:"Fait de se restreindre dans ce que l'on dit par peur.",nuance:"L'autocensure est une forme de contrainte intériorisée.",register:"Société",origin:"Français",frequency:"Courant",difficulty:4,category:"psychologie",synonyms:["Réserve","Prudence excessive"],antonyms:["Liberté d'expression","Franchise"],examples:["L'autocensure est le pire ennemi de la créativité.","Il pratique l'autocensure par peur de représailles."],errors:"L'autocensure est une suppression de la pensée.",level:"C1",tip_darija:"الرقابة الذاتية هي أنك توقف أفكارك بنفسك."},
{id:40,arabic:"Clivage",transliteration:"kli-vaj",definition:"Division profonde entre deux groupes.",nuance:"Le clivage est une notion psychologique et sociale. On parle de 'clivage générationnel'.",register:"Psychologie",origin:"Français",frequency:"Courant",difficulty:4,category:"psychologie",synonyms:["Fracture","Divorce"],antonyms:["Union","Harmonie"],examples:["Il existe un clivage profond entre les générations.","Le clivage gauche-droite est moins net aujourd'hui."],errors:"Le clivage est une division radicale.",level:"C1",tip_darija:"الانفصام هو الإنقسام العميق."},
{id:41,arabic:"Extrémisme",transliteration:"eks-tre-mism",definition:"Position radicale, sans nuance ni compromis.",nuance:"L'extrémisme peut être politique, religieux ou idéologique.",register:"Politique",origin:"Français",frequency:"Fréquent",difficulty:3,category:"politique",synonyms:["Radicalisme","Fanatisme"],antonyms:["Modération","Centre"],examples:["L'extrémisme est un danger pour la démocratie.","Il a condamné l'extrémisme sous toutes ses formes."],errors:"L'extrémisme ne se limite pas à la violence.",level:"B2",tip_darija:"التطرف هو التشدد."},
{id:42,arabic:"Modération",transliteration:"mo-de-ra-syon",definition:"Attitude qui évite les excès, qui cherche l'équilibre.",nuance:"La modération est une valeur souvent promue dans les sociétés démocratiques.",register:"Société",origin:"Latin",frequency:"Courant",difficulty:2,category:"personnalité",synonyms:["Mesure","Tempérance"],antonyms:["Excès","Extrémisme"],examples:["Il faut agir avec modération.","Sa modération est appréciée dans les débats."],errors:"La modération n'est pas l'indécision.",level:"B1",tip_darija:"الاعتدال هو التوازن."},
{id:43,arabic:"Pensée critique",transliteration:"pan-se kri-tik",definition:"Capacité à analyser, questionner et évaluer les informations.",nuance:"La pensée critique permet de ne pas se laisser manipuler.",register:"Éducation",origin:"Français",frequency:"Montant",difficulty:3,category:"pensée critique",synonyms:["Esprit critique","Analyse"],antonyms:["Crédulité","Naïveté"],examples:["Le développement de la pensée critique est un objectif.","La pensée critique permet de déceler les manipulations."],errors:"La pensée critique n'est pas un scepticisme systématique.",level:"B2",tip_darija:"التفكير النقدي هو التفكير التحليلي."},
{id:44,arabic:"Biais",transliteration:"bye",definition:"Inclination inconsciente qui fausse le jugement.",nuance:"Les biais cognitifs sont des raccourcis mentaux qui nous trompent.",register:"Psychologie",origin:"Français",frequency:"Montant",difficulty:4,category:"pensée critique",synonyms:["Préjugé","Parti pris"],antonyms:["Objectivité","Neutralité"],examples:["Il faut être conscient de ses propres biais.","Le biais de confirmation est très répandu."],errors:"Un biais est inconscient.",level:"C1",tip_darija:"التحيز هو الميل اللاواعي."},
{id:45,arabic:"Généralisation",transliteration:"je-ne-ra-li-za-syon",definition:"Action de passer d'un cas particulier à une règle générale.",nuance:"La généralisation peut être utile mais elle est souvent source d'erreurs.",register:"Débat",origin:"Latin",frequency:"Fréquent",difficulty:2,category:"pensée critique",synonyms:["Universalisation","Stéréotypage"],antonyms:["Spécification","Cas par cas"],examples:["La généralisation est dangereuse dans ce débat.","Il fait une généralisation abusive."],errors:"La généralisation n'est pas une tendance statistique.",level:"B2",tip_darija:"التعميم هو الحكم على كل الناس من واحد."},
{id:46,arabic:"Naïveté",transliteration:"na-iv-te",definition:"Manque de discernement, tendance à croire trop facilement.",nuance:"La naïveté peut être touchante chez un enfant, mais dans le monde adulte, elle est souvent perçue comme une faiblesse.",register:"Personnalité",origin:"Français",frequency:"Courant",difficulty:1,category:"personnalité",synonyms:["Crédulité","Simplicité"],antonyms:["Ruse","Méfiance"],examples:["Sa naïveté l'a conduit à faire de mauvais choix.","La naïveté n'est pas un défaut."],errors:"La naïveté n'est pas la gentillesse.",level:"B1",tip_darija:"السذاجة هي البراءة الزايدة."},
{id:47,arabic:"Ruse",transliteration:"ryz",definition:"Habileté à tromper ou à manœuvrer pour obtenir un avantage.",nuance:"La ruse est souvent associée à la manipulation. Elle peut être défensive ou offensive.",register:"Personnalité",origin:"Français",frequency:"Courant",difficulty:2,category:"personnalité",synonyms:["Astuce","Artifice"],antonyms:["Naïveté","Droiture"],examples:["Il a utilisé la ruse pour gagner le débat.","La ruse est parfois nécessaire dans les négociations."],errors:"La ruse peut être positive ou négative.",level:"B1",tip_darija:"الدهاء هو الذكاء العملي."},
{id:48,arabic:"Esquive",transliteration:"es-kiv",definition:"Action d'éviter une situation, une question ou une responsabilité.",nuance:"L'esquive est souvent perçue comme une attitude de fuite.",register:"Psychologie",origin:"Français",frequency:"Fréquent",difficulty:2,category:"psychologie",synonyms:["Dérobade","Fuite"],antonyms:["Affrontement","Assomption"],examples:["Il a répondu par une esquive à cette question.","Son esquive est une preuve de sa mauvaise foi."],errors:"L'esquive est un acte de fuite.",level:"B2",tip_darija:"التملص هو الهروب من شي حاجة."},
{id:49,arabic:"Exploitation",transliteration:"eks-plwa-ta-syon",definition:"Fait de tirer profit de quelqu'un de manière abusive.",nuance:"L'exploitation a une connotation très négative.",register:"Société",origin:"Latin",frequency:"Fréquent",difficulty:2,category:"société",synonyms:["Abus","Profit"],antonyms:["Équité","Partage"],examples:["L'exploitation des travailleurs est un scandale.","Il dénonce l'exploitation des ressources."],errors:"L'exploitation est toujours négative.",level:"B2",tip_darija:"الاستغلال هو استخدام الآخر لمصلحتك."},
{id:50,arabic:"Guérison",transliteration:"ge-ri-zon",definition:"Rétablissement après une maladie, une blessure ou un traumatisme.",nuance:"La guérison est un processus, pas un événement soudain.",register:"Psychologie",origin:"Français",frequency:"Très courant",difficulty:2,category:"psychologie",synonyms:["Rétablissement","Rémission"],antonyms:["Rechute","Aggravation"],examples:["Sa guérison a été longue et difficile.","Il a enfin trouvé le chemin de la guérison."],errors:"La guérison n'est pas l'oubli.",level:"B2",tip_darija:"التعافي هو الشفاء."}
];];

const IMMERSION_TEXTS = [
  {id:1,title:"L'art de la communication",text:"Pour s'exprimer avec éloquence, il ne suffit pas de maîtriser le vocabulaire. Il faut aussi savoir nuancer son discours, reconnaître l'ambigüité de certaines situations, et poser des limites claires. La pertinence d'une remarque dépend souvent du contexte. Une communication réussie demande de l'empathie et une vraie discipline.",words:["Éloquence","Nuancer","Ambigüité","Pertinent","Limites","Empathie","Discipline"],category:"communication"},
  {id:2,title:"Une société en mutation",text:"Notre société est marquée par la polarisation des débats et la banalisation de l'exclusion. La marginalisation de certains groupes crée un sentiment d'aliénation. Pour y remédier, il faut renforcer la solidarité et lutter contre la corruption. Les réformes structurelles sont nécessaires, mais elles doivent s'accompagner d'une vraie transparence et d'un respect de l'intégrité.",words:["Polarisation","Banalisation","Exclusion","Marginalisation","Aliénation","Solidarité","Corruption","Réforme","Transparence","Intégrité"],category:"société"},
  {id:3,title:"Le monde professionnel",text:"Dans le monde du travail, la compétence et le mérite sont souvent mis en avant, mais la réalité est parfois différente. L'autonomie et l'autonomisation sont des objectifs clés. La discipline et la responsabilité sont des qualités très recherchées. Enfin, il faut savoir reconnaître et dénoncer les situations d'exploitation et de bureaucratie excessive.",words:["Compétence","Mérite","Autonomie","Autonomisation","Discipline","Responsabilité","Exploitation","Bureaucratie"],category:"travail"},
  {id:4,title:"L'ère numérique",text:"L'identité numérique est devenue aussi importante que l'identité réelle. L'addiction numérique est un vrai problème de santé publique. Elle peut conduire à une forme d'aliénation. Pour s'en protéger, il faut parfois pratiquer une certaine forme d'autocensure. Mais attention, une autocensure excessive peut aussi nuire à la liberté d'expression.",words:["Identité numérique","Addiction numérique","Aliénation","Autocensure"],category:"numérique"},
  {id:5,title:"Développer son esprit critique",text:"La pensée critique est une compétence essentielle à notre époque. Elle permet de ne pas tomber dans le piège des généralisations abusives et des biais cognitifs. La modération est souvent plus difficile que l'extrémisme, mais elle est aussi plus intelligente. La naïveté peut être un frein, mais la ruse excessive n'est pas une solution. La guérison d'un esprit dogmatique passe par la nuance.",words:["Pensée critique","Généralisation","Biais","Modération","Extrémisme","Naïveté","Ruse","Guérison","Nuancer"],category:"esprit critique"}
];

function getTextVocab(t){return t?VOCABULARY.filter(v=>t.words.includes(v.arabic)):[]}
function findTextsForWord(wordId){const w=VOCABULARY.find(v=>v.id===wordId);if(!w)return[];return IMMERSION_TEXTS.filter(t=>t.words.includes(w.arabic))}
function getParcoursWords(p){return VOCABULARY.filter(w=>p.categories.includes(w.category))}
function getParcoursMastery(p,srsData){const words=getParcoursWords(p);if(!words.length)return 0;const known=words.filter(w=>srsData[w.id]&&srsData[w.id].status==='known').length;return Math.round((known/words.length)*100)}
function findParcoursForWord(wordId){const w=VOCABULARY.find(v=>v.id===wordId);if(!w)return null;return PARCOURS.find(p=>p.categories.includes(w.category))||null}
function getUnitWords(u){return VOCABULARY.filter(w=>u.wordIds.includes(w.id))}
function loadUnitProgress(){try{return JSON.parse(localStorage.getItem('francais_units')||'{}')}catch(e){return{}}}
function saveUnitProgress(p){try{localStorage.setItem('francais_units',JSON.stringify(p))}catch(e){}}
function isUnitUnlocked(unitId,progress){if(unitId===1)return true;return!!(progress[unitId-1]&&progress[unitId-1].completed)}
function isUnitCompleted(unitId,progress){return!!(progress[unitId]&&progress[unitId].completed)}
function loadSRS(){try{return JSON.parse(localStorage.getItem('francais_srs')||'{}')}catch(e){return{}}}
function saveSRS(s){try{localStorage.setItem('francais_srs',JSON.stringify(s));return true}catch(e){return false}}
function loadStats(){try{return JSON.parse(localStorage.getItem('francais_stats')||'{}')}catch(e){return{}}}
function saveStats(s){try{localStorage.setItem('francais_stats',JSON.stringify(s));return true}catch(e){return false}}

function reviewCard(srsData,id,quality){
  const prev=srsData[id]||{ease:2.5,interval:0,reps:0,due:new Date().toISOString()};
  let{ease,interval,reps}=prev;
  if(quality===0){reps=0;interval=1;ease=Math.max(1.3,ease-0.25)}
  else if(quality===1){reps=reps+1;interval=reps<=1?1:Math.max(1,Math.round(interval*1.2));ease=Math.max(1.3,ease-0.05)}
  else{reps=reps+1;interval=reps<=1?3:Math.round(interval*ease);ease=Math.min(2.8,ease+0.1)}
  const due=new Date(Date.now()+interval*86400000).toISOString();
  const status=quality===0?'unknown':quality===1?'medium':'known';
  const card={ease,interval,reps,due,status,lastReview:new Date().toISOString()};
  return{...srsData,[id]:card};
}
function isDue(card){if(!card)return true;return new Date(card.due)<=new Date()}
function dayOfYear(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000)}

let _voicesCache=[];
function warmUpVoices(){
  try{
    if(!('speechSynthesis' in window))return;
    const synth=window.speechSynthesis;
    const grab=()=>{const v=synth.getVoices();if(v&&v.length)_voicesCache=v};
    grab();
    synth.addEventListener('voiceschanged',grab);
  }catch(e){}
}
function speakFrench(text){
  try{
    if(!('speechSynthesis' in window))return;
    const synth=window.speechSynthesis;
    synth.cancel();
    const voices=(_voicesCache&&_voicesCache.length)?_voicesCache:synth.getVoices();
    const u=new SpeechSynthesisUtterance(text);
    const frVoice=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith('fr'));
    if(frVoice)u.voice=frVoice;
    u.lang=frVoice?frVoice.lang:'fr-FR';
    u.rate=0.85;
    u.pitch=1;
    synth.speak(u);
  }catch(e){}
}

function LevelBadge({level}){const f=LEVELS.find(l=>l.id===level)||LEVELS[0];return React.createElement('span',{className:'level-badge',style:{color:f.color,borderColor:f.color+'44'}},f.label)}
function DiffDots({n}){return React.createElement('div',{className:'diff-dots'},...[1,2,3,4,5].map(i=>React.createElement('div',{key:i,className:'diff-dot'+(i<=n?' filled':'')})))}

    )
  );
}

// COMPOSANT IMMERSION
// ============================================================
function ImmersionTab({onOpen,activeId,onSetActiveId,onRead}){
  const active=IMMERSION_TEXTS.find(t=>t.id===activeId)||IMMERSION_TEXTS[0];
  const[toast,setToast]=useState(null);
  useEffect(()=>{onRead(active.id)},[active.id]);
  const renderText=(text,kws)=>{
    let parts=[{text,isWord:false}];
    kws.forEach(kw=>{
      const np=[];
      parts.forEach(p=>{
        if(p.isWord||!p.text.includes(kw)){np.push(p);return;}
        const idx=p.text.indexOf(kw);
        if(idx>0)np.push({text:p.text.slice(0,idx),isWord:false});
        np.push({text:kw,isWord:true});
        if(idx+kw.length<p.text.length)np.push({text:p.text.slice(idx+kw.length),isWord:false});
      });
      parts=np;
    });
    return parts;
  };
  const tap=word=>{
    const f=VOCABULARY.find(v=>word.includes(v.arabic)||v.arabic.includes(word));
    if(f){setToast('"'+f.arabic+'" → '+f.transliteration);setTimeout(()=>setToast(null),2000);onOpen(f);}
  };
  const keyWords=getTextVocab(active);
  return React.createElement('div',null,
    toast&&React.createElement('div',{className:'toast'},toast),
    React.createElement('div',{style:{padding:'20px 16px 12px'}},
      React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},'Mode Immersion'),
      React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginTop:4}},'Touchez les mots surlignés')
    ),
    React.createElement('div',{className:'chip-row',style:{marginBottom:16}},
      IMMERSION_TEXTS.map(t=>React.createElement('div',{key:t.id,className:'chip'+(active.id===t.id?' active':''),onClick:()=>onSetActiveId(t.id)},t.title))
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'card'},
        React.createElement('div',{style:{padding:20}},
          React.createElement('div',{style:{fontSize:11,fontWeight:600,color:'var(--text3)',marginBottom:12,textTransform:'uppercase',letterSpacing:1}},active.category.toUpperCase()),
          React.createElement('div',{style:{fontSize:16,lineHeight:1.9,color:'var(--text2)'}},
            ...renderText(active.text,active.words).map((p,i)=>
              p.isWord?React.createElement('span',{key:i,className:'immersion-word',onClick:()=>tap(p.text)},p.text):React.createElement('span',{key:i},p.text)
            )
          )
        )
      )
    ),
    keyWords.length>0&&React.createElement('div',{className:'section'},
      React.createElement('div',{className:'section-title'},'📌 Mots-clés de ce texte'),
      React.createElement('div',{className:'card',style:{padding:16,display:'flex',flexDirection:'column',gap:8}},
        keyWords.map(w=>React.createElement('div',{key:w.id,onClick:()=>onOpen(w),style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 4px',cursor:'pointer',borderBottom:'1px solid var(--border)'}},
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:15,fontWeight:600}},w.arabic),
            React.createElement('div',{style:{fontSize:12,color:'var(--text3)'}},w.transliteration)
          ),
          React.createElement('span',{style:{color:'var(--text3)',fontSize:18}},'›')
        ))
      )
    )
  );
}

function QuizTab({srsData,onSRS,initialMode,initialTextId,initialParcoursId,initialUnitId,onModeConsumed,onUnitComplete,onExitToLibrary}){
  const[mode,setMode]=useState(initialMode||'menu');
  const[textId,setTextId]=useState(initialTextId||IMMERSION_TEXTS[0].id);
  const[parcoursId,setParcoursId]=useState(initialParcoursId||PARCOURS[0].id);
  const[unitId,setUnitId]=useState(initialUnitId||UNITS[0].id);
  useEffect(()=>{if(initialMode){setMode(initialMode);if(initialTextId)setTextId(initialTextId);if(initialParcoursId)setParcoursId(initialParcoursId);if(initialUnitId)setUnitId(initialUnitId);onModeConsumed&&onModeConsumed();}},[initialMode]);

  const pool=useMemo(()=>{
    if(mode==='text'){const t=IMMERSION_TEXTS.find(x=>x.id===textId);return getTextVocab(t)}
    if(mode==='parcours'){const p=PARCOURS.find(x=>x.id===parcoursId);return p?getParcoursWords(p):VOCABULARY}
    if(mode==='unit'){const u=UNITS.find(x=>x.id===unitId);return u?getUnitWords(u):VOCABULARY}
    if(mode==='due'){const due=VOCABULARY.filter(w=>isDue(srsData[w.id]));return due.length>=4?due:VOCABULARY}
    return VOCABULARY;
  },[mode,textId,parcoursId,unitId]);

  const makeQFor=word=>{
    const sameCat=VOCABULARY.filter(w=>w.id!==word.id&&w.category===word.category);
    const wrongPool=sameCat.length>=3?sameCat:VOCABULARY.filter(w=>w.id!==word.id);
    const wrong=wrongPool.sort(()=>Math.random()-.5).slice(0,3).map(w=>w.definition);
    const opts=[word.definition,...wrong].sort(()=>Math.random()-.5);
    return{word,options:opts,correct:word.definition};
  };

  const[session,setSession]=useState([]);
  const[sessionIdx,setSessionIdx]=useState(0);
  const[correctCount,setCorrectCount]=useState(0);
  const[finished,setFinished]=useState(false);
  const completedRef=useRef(false);
  useEffect(()=>{
    if(mode==='unit'){
      const u=UNITS.find(x=>x.id===unitId);
      const words=u?getUnitWords(u):[];
      setSession([...words].sort(()=>Math.random()-.5));
      setSessionIdx(0);setCorrectCount(0);setFinished(false);completedRef.current=false;
    }
  },[mode,unitId]);
  const sessionQ=mode==='unit'&&session.length?makeQFor(session[sessionIdx]):null;

  const[idx,setIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const pickWord=lastId=>{
    const candidates=pool.filter(w=>w.id!==lastId);
    return(candidates.length?candidates:pool)[Math.floor(Math.random()*(candidates.length||pool.length))];
  };
  const[q,setQ]=useState(null);
  useEffect(()=>{if(mode!=='menu'&&mode!=='unit'){setQ(makeQFor(pickWord(null)));setIdx(0);setSelected(null)}},[mode,textId,parcoursId]);

  const handle=opt=>{
    if(mode==='unit'){
      if(selected||!sessionQ)return;
      setSelected(opt);
      const isCorrect=opt===sessionQ.correct;
      const quality=isCorrect?2:0;
      const n=reviewCard(srsData,sessionQ.word.id,quality);saveSRS(n);onSRS(n);
      if(isCorrect)setCorrectCount(c=>c+1);
      setTimeout(()=>{
        setSelected(null);
        if(sessionIdx+1<session.length){setSessionIdx(i=>i+1)}
        else{setFinished(true)}
      },1200);
      return;
    }
    if(selected||!q)return;
    setSelected(opt);
    const quality=opt===q.correct?2:0;
    const n=reviewCard(srsData,q.word.id,quality);saveSRS(n);onSRS(n);
    setTimeout(()=>{setIdx(p=>p+1);setQ(makeQFor(pickWord(q.word.id)));setSelected(null);},1200);
  };

  useEffect(()=>{
    if(mode==='unit'&&finished&&!completedRef.current){
      completedRef.current=true;
      const score=session.length?Math.round((correctCount/session.length)*100):0;
      const passed=score>=80;
      onUnitComplete&&onUnitComplete(unitId,passed,score);
    }
  },[finished]);

  if(mode==='menu')return React.createElement('div',null,
    React.createElement('div',{style:{padding:'20px 16px 8px'}},
      React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},'Quiz'),
      React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginTop:4}},'Choisis ton mode')
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'card',style:{padding:16,marginBottom:12,cursor:'pointer'},onClick:()=>setMode('general')},
        React.createElement('div',{style:{fontSize:15,fontWeight:600}},'🎯 Quiz Général'),
        React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:4}},'Sur les '+VOCABULARY.length+' mots du dictionnaire')
      ),
      React.createElement('div',{className:'card',style:{padding:16,marginBottom:12,cursor:'pointer'},onClick:()=>setMode('due')},
        React.createElement('div',{style:{fontSize:15,fontWeight:600}},'⏳ Mots à réviser'),
        React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:4}},'Cible les mots arrivés à échéance')
      ),
      React.createElement('div',{className:'section-title',style:{marginTop:8}},'Par parcours thématique'),
      ...PARCOURS.map(p=>React.createElement('div',{key:p.id,className:'card',style:{padding:16,marginBottom:10,cursor:'pointer',display:'flex',alignItems:'center',gap:12},onClick:()=>{setParcoursId(p.id);setMode('parcours')}},
        React.createElement('div',{style:{fontSize:22}},p.icon),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:15,fontWeight:600}},p.title),
          React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:2}},getParcoursWords(p).length+' mots du module')
        )
      )),
      React.createElement('div',{className:'section-title',style:{marginTop:8}},'Quiz ciblé par texte'),
      ...IMMERSION_TEXTS.map(t=>React.createElement('div',{key:t.id,className:'card',style:{padding:16,marginBottom:10,cursor:'pointer'},onClick:()=>{setTextId(t.id);setMode('text')}},
        React.createElement('div',{style:{fontSize:15,fontWeight:600}},t.title),
        React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:4}},getTextVocab(t).length+' mots dans ce texte')
      ))
    )
  );

  if(mode==='unit'&&finished){
    const u=UNITS.find(x=>x.id===unitId);
    const score=session.length?Math.round((correctCount/session.length)*100):0;
    const passed=score>=80;
    return React.createElement('div',{style:{padding:'40px 24px',textAlign:'center'}},
      React.createElement('div',{style:{fontSize:54,marginBottom:12}},passed?'🎉':'💪'),
      React.createElement('div',{style:{fontSize:22,fontWeight:700,marginBottom:6}},passed?'Palier validé !':'Pas encore'),
      React.createElement('div',{style:{fontSize:14,color:'var(--text3)',marginBottom:24}},correctCount+' / '+session.length+' bonnes réponses ('+score+'%)'),
      !passed&&React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:20,lineHeight:1.5}},'Il te faut au moins 80% pour débloquer l\'unité suivante. Retente !'),
      React.createElement('button',{onClick:()=>{setMode('unit');setSession([...getUnitWords(u)].sort(()=>Math.random()-.5));setSessionIdx(0);setCorrectCount(0);setFinished(false);completedRef.current=false;},style:{width:'100%',background:u.color,border:'none',borderRadius:14,padding:'14px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:10}},'🔁 Recommencer le palier'),
      React.createElement('button',{onClick:()=>onExitToLibrary&&onExitToLibrary(),style:{width:'100%',background:'var(--bg4)',border:'1px solid var(--border)',borderRadius:14,padding:'14px',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},'← Retour au parcours')
    );
  }

  if(mode==='unit'){
    if(!sessionQ)return null;
    return React.createElement('div',null,
      React.createElement('div',{style:{padding:'20px 16px 8px'}},
        React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},'Palier'),
        React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginTop:4}},'Question '+(sessionIdx+1)+' / '+session.length)
      ),
      React.createElement('div',{style:{display:'flex',gap:6,padding:'0 16px 16px'}},
        session.map((w,i)=>React.createElement('div',{key:i,style:{flex:1,height:5,borderRadius:3,background:i<sessionIdx?'var(--green)':i===sessionIdx?'var(--accent)':'var(--bg5)'}}))
      ),
      React.createElement('div',{className:'section',style:{marginTop:0}},
        React.createElement('div',{className:'word-hero',style:{cursor:'default',marginBottom:20}},
          React.createElement('div',{className:'word-hero-content'},
            React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}},'QUEL EST LE SENS ?'),
            React.createElement('div',{className:'french-word'},sessionQ.word.arabic),
            React.createElement('div',{className:'transliteration'},sessionQ.word.transliteration),
            React.createElement('div',{style:{marginTop:10}},React.createElement(LevelBadge,{level:sessionQ.word.level}))
          )
        ),
        ...sessionQ.options.map((opt,i)=>{
          let cls='quiz-option';
          if(selected){if(opt===sessionQ.correct)cls+=' correct';else if(opt===selected)cls+=' wrong';}
          return React.createElement('div',{key:i,className:cls,onClick:()=>handle(opt)},opt);
        })
      )
    );
  }

  if(!q)return null;

  return React.createElement('div',null,
    React.createElement('div',{style:{padding:'20px 16px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},'Quiz'),
        React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginTop:4}},'Question '+(idx+1)+' · '+pool.length+' mots dans ce mode')
      ),
      React.createElement('button',{onClick:()=>setMode('menu'),style:{background:'var(--bg4)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',color:'#fff',fontSize:12,cursor:'pointer'}},'Changer')
    ),
    React.createElement('div',{className:'section',style:{marginTop:8}},
      React.createElement('div',{className:'word-hero',style:{cursor:'default',marginBottom:20}},
        React.createElement('div',{className:'word-hero-content'},
          React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}},'QUEL EST LE SENS ?'),
          React.createElement('div',{className:'french-word'},q.word.arabic),
          React.createElement('div',{className:'transliteration'},q.word.transliteration),
          React.createElement('div',{style:{marginTop:10}},React.createElement(LevelBadge,{level:q.word.level}))
        )
      ),
      ...q.options.map((opt,i)=>{
        let cls='quiz-option';
        if(selected){if(opt===q.correct)cls+=' correct';else if(opt===selected)cls+=' wrong';}
        return React.createElement('div',{key:i,className:cls,onClick:()=>handle(opt)},opt);
      })
    )
  );
}

function ProgressTab({srsData,stats,onImport,readTexts}){
  const known=Object.values(srsData).filter(v=>v.status==='known').length;
  const medium=Object.values(srsData).filter(v=>v.status==='medium').length;
  const unknown=Object.values(srsData).filter(v=>v.status==='unknown').length;
  const pctKnown=Math.round((known/VOCABULARY.length)*100);
  const hasReadImmersion=(readTexts||[]).length>0;
  const badge=pctKnown>70&&hasReadImmersion?{ar:'المفكر',fr:'Penseur',color:'#BF5AF2',icon:'🧠'}
    :pctKnown>=30?{ar:'المشارك',fr:'Participant',color:'#0A84FF',icon:'💬'}
    :{ar:'الملاحظ',fr:'Observateur',color:'#8E8E93',icon:'👁️'};
  const fileRef=useRef(null);
  const handleExport=()=>{
    try{
      const data=JSON.stringify({srs:srsData,stats,exportedAt:new Date().toISOString()},null,2);
      const blob=new Blob([data],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='francais-elevate-backup.json';a.click();
      URL.revokeObjectURL(url);
    }catch(e){}
  };
  const handleImportFile=e=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed&&parsed.srs)onImport(parsed.srs,parsed.stats||{});
      }catch(err){}
    };
    reader.readAsText(file);
    e.target.value='';
  };
  return React.createElement('div',null,
    React.createElement('div',{style:{padding:'20px 16px 8px'}},
      React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5,marginBottom:4}},'Progression'),

      React.createElement('div',{style:{background:'linear-gradient(135deg,#1a1a2e,#16213e)',border:'1px solid rgba(94,92,230,.3)',borderRadius:24,padding:28,textAlign:'center',position:'relative',overflow:'hidden'}},
        React.createElement('div',{style:{position:'absolute',top:-40,right:-40,width:160,height:160,background:'radial-gradient(circle,rgba(94,92,230,.2),transparent 70%)',borderRadius:'50%'}}),
        React.createElement('div',{style:{fontSize:72,fontWeight:800,color:'white',letterSpacing:-2}},known),
        React.createElement('div',{style:{fontSize:16,color:'rgba(255,255,255,.5)'}},'mots maîtrisés'),

          React.createElement('div',{style:{textAlign:'center'}},React.createElement('div',{style:{fontSize:20,fontWeight:700,color:'#FF453A'}},unknown),React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,.4)'}},'inconnus'))

// COMPOSANT APP
// ============================================================
const TABS=[{id:'home',icon:'⌂',label:'Accueil'},{id:'library',icon:'◫',label:'Mots'},{id:'immersion',icon:'◉',label:'Immersion'},{id:'quiz',icon:'◈',label:'Quiz'},{id:'progress',icon:'▣',label:'Progrès'}];

function App(){
  const[tab,setTab]=useState('home');
  const[word,setWord]=useState(null);
  const[srsData,setSrsData]=useState(loadSRS);
  const[stats,setStats]=useState(()=>{
    const s=loadStats();
    const today=new Date().toDateString();
    if(s.lastDay!==today){
      const y=new Date(Date.now()-86400000).toDateString();
      const streak=s.lastDay===y?(s.streak||0)+1:1;
      const ns={...s,streak,lastDay:today};
      saveStats(ns);return ns;
    }
    return s;
  });
  const[immersionId,setImmersionIdState]=useState(()=>{try{return JSON.parse(localStorage.getItem('francais_last_immersion'))||IMMERSION_TEXTS[0].id}catch(e){return IMMERSION_TEXTS[0].id}});
  const[readTexts,setReadTexts]=useState(()=>{try{return JSON.parse(localStorage.getItem('francais_read_texts'))||[]}catch(e){return[]}});
  const[unitProgress,setUnitProgress]=useState(loadUnitProgress);
  const[quizInit,setQuizInit]=useState(null);

  const scrollRef=useRef(null);
  const go=t=>{setTab(t);setWord(null);scrollRef.current?.scrollTo(0,0)};
  const open=w=>{setWord(w);scrollRef.current?.scrollTo(0,0)};
  const back=()=>{setWord(null);scrollRef.current?.scrollTo(0,0)};
  const updateSRS=n=>{setSrsData(n)};
  const onImport=(srs,st)=>{
    setSrsData(srs);saveSRS(srs);
    setStats(st);saveStats(st);
  };

  const setImmersionId=id=>{setImmersionIdState(id);try{localStorage.setItem('francais_last_immersion',JSON.stringify(id))}catch(e){}};
  const markTextRead=id=>{setReadTexts(prev=>{if(prev.includes(id))return prev;const n=[...prev,id];try{localStorage.setItem('francais_read_texts',JSON.stringify(n))}catch(e){}return n})};
  const goToImmersion=id=>{setImmersionId(id);setWord(null);setTab('immersion');scrollRef.current?.scrollTo(0,0)};
  const goToQuizDue=()=>{setQuizInit({mode:'due'});setWord(null);setTab('quiz');scrollRef.current?.scrollTo(0,0)};
  const goToQuizParcours=pid=>{setQuizInit({mode:'parcours',parcoursId:pid});setWord(null);setTab('quiz');scrollRef.current?.scrollTo(0,0)};
  const goToQuizUnit=uid=>{setQuizInit({mode:'unit',unitId:uid});setWord(null);setTab('quiz');scrollRef.current?.scrollTo(0,0)};
  const goToProgress=()=>go('progress');
  const consumeQuizInit=()=>setQuizInit(null);
  const onUnitComplete=(unitId,passed,score)=>{
    setUnitProgress(prev=>{
      const prevBest=(prev[unitId]&&prev[unitId].bestScore)||0;
      const n={...prev,[unitId]:{completed:passed||(prev[unitId]&&prev[unitId].completed)||false,bestScore:Math.max(score,prevBest)}};
      saveUnitProgress(n);
      return n;
    });
  };

  let content;
  if(word)content=React.createElement(WordDetail,{word,onBack:back,onSRS:updateSRS,srsData,onGoToImmersion:goToImmersion});
  else if(tab==='home')content=React.createElement(HomeTab,{onOpen:open,srsData,stats,lastImmersionId:immersionId,onGoToImmersion:goToImmersion,onGoToQuizDue:goToQuizDue,onGoToProgress:goToProgress});
  else if(tab==='library')content=React.createElement(LibraryTab,{onOpen:open,srsData,onGoToImmersion:goToImmersion,onGoToQuizUnit:goToQuizUnit,unitProgress});
  else if(tab==='immersion')content=React.createElement(ImmersionTab,{onOpen:open,activeId:immersionId,onSetActiveId:setImmersionId,onRead:markTextRead});
  else if(tab==='quiz')content=React.createElement(QuizTab,{srsData,onSRS:updateSRS,initialMode:quizInit&&quizInit.mode,initialTextId:quizInit&&quizInit.textId,initialParcoursId:quizInit&&quizInit.parcoursId,initialUnitId:quizInit&&quizInit.unitId,onModeConsumed:consumeQuizInit,onUnitComplete,onExitToLibrary:()=>go('library')});
  else content=React.createElement(ProgressTab,{srsData,stats,onImport,readTexts});

  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'scroll-area',ref:scrollRef},content),
    React.createElement('nav',{className:'nav-bar'},
      TABS.map(t=>React.createElement('button',{key:t.id,className:'nav-item'+(tab===t.id&&!word?' active':''),onClick:()=>go(t.id)},
        React.createElement('span',{className:'nav-icon'},t.icon),
        React.createElement('span',{className:'nav-label'},t.label)
      ))
    )
  );
}

// ============================================================
// LANCEMENT DE L'APPLICATION
// ============================================================
warmUpVoices();
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
