<!DOCTYPE html>
<html lang="fr">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--bg2:#0C0C0E;--bg3:#1C1C1E;--bg4:#2C2C2E;--bg5:#3A3A3C;--text:#FFF;--text2:rgba(255,255,255,.75);--text3:rgba(255,255,255,.4);--accent:#5E5CE6;--green:#30D158;--red:#FF453A;--orange:#FF9F0A;--border:rgba(255,255,255,.08)}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;overflow:hidden;height:100%}
#root{height:100%}
.app{max-width:430px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.nav-bar{background:rgba(0,0,0,.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:8px 0 max(20px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;border:none;background:none;color:var(--text3)}
.nav-item.active{color:var(--text)}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-weight:500}
.card{background:var(--bg3);border-radius:20px;border:1px solid var(--border);overflow:hidden}
.word-hero{margin:16px;border-radius:28px;overflow:hidden;position:relative;min-height:200px;background:linear-gradient(145deg,#1a1a2e,#16213e,#0f3460);border:1px solid rgba(94,92,230,.3);cursor:pointer}
.word-hero-content{padding:24px}
.word-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(94,92,230,.2);border:1px solid rgba(94,92,230,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#8B8EFF;margin-bottom:14px}
.french-word{font-size:38px;font-weight:700;margin-bottom:6px}
.transliteration{font-size:17px;color:var(--text2);font-style:italic;margin-bottom:12px}
.definition-text{font-size:13px;color:var(--text2);line-height:1.5}
.tag{display:inline-flex;align-items:center;background:var(--bg4);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--text2)}
.section{padding:0 16px;margin-bottom:18px}
.section-title{font-size:20px;font-weight:700;margin-bottom:14px}
.detail-row{display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:13px;color:var(--text3)}
.detail-value{font-size:13px;color:var(--text);text-align:left;max-width:65%}
.example-card{background:var(--bg4);border-radius:14px;padding:14px;margin-bottom:10px;font-size:15px;line-height:1.6;border-left:3px solid var(--accent)}
.srs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
.srs-btn{border:none;border-radius:14px;padding:14px 8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.srs-btn:active{transform:scale(.95)}
.srs-btn.unknown{background:rgba(255,69,58,.15);color:#FF453A;border:1px solid rgba(255,69,58,.25)}
.srs-btn.medium{background:rgba(255,159,10,.15);color:#FF9F0A;border:1px solid rgba(255,159,10,.25)}
.srs-btn.known{background:rgba(48,209,88,.15);color:#30D158;border:1px solid rgba(48,209,88,.25)}
.progress-bar-bg{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px}
.level-badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid currentColor}
.quiz-option{background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;font-size:14px}
.quiz-option.correct{border-color:var(--green);background:rgba(48,209,88,.08);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(255,69,58,.08);color:var(--red)}
.stat-block{flex:1;background:var(--bg3);border-radius:16px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--text3)}
.search-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);width:100%;outline:none}
.search-bar::placeholder{color:var(--text3)}
.immersion-word{background:rgba(94,92,230,.15);border-bottom:1.5px solid var(--accent);cursor:pointer;border-radius:2px}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);white-space:nowrap}
.chip.active{border-color:var(--accent);background:rgba(94,92,230,.15);color:var(--text)}
.word-list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.word-list-item:last-child{border-bottom:none}
.word-list-left{display:flex;align-items:center;gap:12px}
.word-french-sm{font-size:20px;font-weight:600}
.word-translit-sm{font-size:12px;color:var(--text3)}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text)}
.word-detail-header{padding:20px 16px 0;display:flex;align-items:center;gap:12px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300}
.install-tip{margin:12px 16px;background:rgba(94,92,230,.08);border:1px solid rgba(94,92,230,.2);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--text3)}
.install-tip strong{color:var(--text2)}
.tip-darija{background:rgba(191,90,242,.08);border:1px solid rgba(191,90,242,.2);border-radius:14px;padding:12px 16px;margin:12px 0;font-size:13px;color:var(--text2);direction:rtl;text-align:right}
.tip-darija::before{content:'💡 '}
</style>
</head>

<div id="root"></div>
<script>
const{useState,useEffect,useRef,useMemo}=React;

let V=[],TEXTS=[],CATS=[],PARCOURS=[],UNITS=[],LEVELS=[];

function getWord(id){return V.find(w=>w.id===id)}
function getWords(ids){return ids.map(id=>getWord(id)).filter(Boolean)}
function getParcoursWords(p){return V.filter(w=>p.cats.includes(w.c))}
function loadSRS(){try{return JSON.parse(localStorage.getItem('fsrs')||'{}')}catch(e){return{}}}
function saveSRS(s){try{localStorage.setItem('fsrs',JSON.stringify(s))}catch(e){}}
function loadStats(){try{return JSON.parse(localStorage.getItem('fstats')||'{}')}catch(e){return{}}}

function loadUnitProg(){try{return JSON.parse(localStorage.getItem('funits')||'{}')}catch(e){return{}}}

function isDue(card){if(!card)return true;return new Date(card.due)<=new Date()}
function dayOfYear(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000)}

function reviewCard(srs,id,q){
const prev=srs[id]||{ease:2.5,interval:0,reps:0,due:new Date().toISOString()};
let{ease:e,interval,reps}=prev;
if(q===0){reps=0;interval=1;e=Math.max(1.3,e-0.25)}
else if(q===1){reps=reps+1;interval=reps<=1?1:Math.max(1,Math.round(interval*1.2));e=Math.max(1.3,e-0.05)}
else{reps=reps+1;interval=reps<=1?3:Math.round(interval*e);e=Math.min(2.8,e+0.1)}
const due=new Date(Date.now()+interval*86400000).toISOString();
const status=q===0?'unknown':q===1?'medium':'known';
return{...srs,[id]:{ease:e,interval,reps,due,status,lastReview:new Date().toISOString()}};
}

let voices=[];
function speak(text){try{if(!window.speechSynthesis)return;const synth=window.speechSynthesis;synth.cancel();const v=voices.length?voices:synth.getVoices();const u=new SpeechSynthesisUtterance(text);const f=v.find(v=>v.lang&&v.lang.toLowerCase().startsWith('fr'));if(f)u.voice=f;u.lang='fr-FR';u.rate=.85;synth.speak(u)}catch(e){}}
function warmUp(){try{if(!window.speechSynthesis)return;const synth=window.speechSynthesis;const grab=()=>{const v=synth.getVoices();if(v&&v.length)voices=v};grab();synth.addEventListener('voiceschanged',grab)}catch(e){}}

function LevelBadge({level}){const f=LEVELS.find(l=>l.id===level)||LEVELS[0];return React.createElement('span',{className:'level-badge',style:{color:f.color,borderColor:f.color+'44'}},f.label)}

function WordDetail({word,onBack,onSRS,srs,onGoText}){

const[chosen,setChosen]=useState(card?card.status:null);
const handle=q=>{const c=q===0?'unknown':q===1?'medium':'known';setChosen(c);const n=reviewCard(srs,word.id,q);saveSRS(n);setTimeout(()=>onSRS(n),200)};

),

),
React.createElement('div',{className:'french-word'},word.a),
React.createElement('div',{className:'transliteration'},word.t),

),

),
React.createElement('div',{style:{display:'flex',gap:8,padding:'0 16px 16px',flexWrap:'wrap'}},
React.createElement(LevelBadge,{level:word.l}),

card&&React.createElement('span',{className:'tag'},'⏳ révision '+new Date(card.due).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}))
),

),

)

),

React.createElement('button',{onClick:()=>setShowAll(!showAll),style:{background:'none',border:'none',color:'var(--accent)',fontSize:13,cursor:'pointer'}},showAll?'Réduire':'Voir tout')
),
...(showAll?word.ex:word.ex.slice(0,2)).map((ex,i)=>React.createElement('div',{key:i,className:'example-card'},ex))
),
React.createElement('div',{className:'section'},
React.createElement('div',{className:'card',style:{borderColor:'rgba(255,69,58,.2)'}},
React.createElement('div',{style:{padding:16}},
React.createElement('div',{style:{fontSize:11,fontWeight:600,color:'#FF453A',textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'⚠ ERREURS'),
React.createElement('div',{style:{fontSize:13,color:'var(--text2)'}},word.err)
)
)
),
word.tip&&React.createElement('div',{className:'section'},
React.createElement('div',{className:'tip-darija'},word.tip)
),
React.createElement('div',{className:'section'},
React.createElement('div',{style:{fontSize:13,color:'var(--text3)',textAlign:'center',marginBottom:12}},'Tu connais ce mot ?'),
React.createElement('div',{className:'card'},
React.createElement('div',{className:'srs-row'},
['unknown','medium','known'].map((c,i)=>React.createElement('button',{key:c,className:'srs-btn '+c,onClick:()=>handle(i),style:{opacity:chosen&&chosen!==c?.45:1}},
React.createElement('span',{className:'srs-icon'},[' ❌','🤔','✅'][i]),
React.createElement('span',null,['Inconnu','Moyen','Je connais'][i])
))
)
)
)
)
}

function Home({onOpen,srs,stats,lastTextId,onGoText,onGoQuiz,onGoProgress}){
const today=V[dayOfYear(new Date())%V.length];
const known=Object.values(srs).filter(v=>v.status==='known').length;
const medium=Object.values(srs).filter(v=>v.status==='medium').length;
const due=V.filter(w=>isDue(srs[w.id]));
const pct=Math.round((known/V.length)*100);
const last=TEXTS.find(t=>t.id===lastTextId)||TEXTS[0];
return React.createElement('div',null,
React.createElement('div',{style:{padding:'16px'}},
React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginBottom:4}},'Bonjour 👋'),
React.createElement('div',{style:{fontSize:26,fontWeight:700}},'Français Elevate')
),
React.createElement('div',{style:{display:'flex',gap:10,padding:'0 16px'}},
React.createElement('div',{className:'stat-block'},React.createElement('div',{className:'stat-num',style:{color:'var(--green)'}},known),React.createElement('div',{className:'stat-label'},'Connus')),
React.createElement('div',{className:'stat-block'},React.createElement('div',{className:'stat-num',style:{color:'var(--orange)'}},medium),React.createElement('div',{className:'stat-label'},'En révision')),
React.createElement('div',{className:'stat-block'},React.createElement('div',{className:'stat-num',style:{color:'var(--accent)'}},stats.streak||0),React.createElement('div',{className:'stat-label'},'Série 🔥'))
),
React.createElement('div',{style:{padding:'16px 16px 4px'}},
React.createElement('div',{style:{fontSize:12,fontWeight:600,color:'var(--text3)',textTransform:'uppercase'}},'MOT DU JOUR')
),
React.createElement('div',{className:'word-hero',onClick:()=>onOpen(today)},
React.createElement('div',{className:'word-hero-content'},
React.createElement('div',{className:'word-badge'},React.createElement('span',{className:'dot-live'}),today.r),
React.createElement('div',{className:'french-word'},today.a),
React.createElement('div',{className:'transliteration'},today.t),
React.createElement('div',{className:'definition-text'},today.d)
)
),
React.createElement('div',{style:{padding:'16px',display:'flex',flexDirection:'column',gap:10}},
React.createElement('div',{onClick:()=>onGoText(last.id),style:{display:'flex',alignItems:'center',gap:14,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:16,padding:14,cursor:'pointer'}},
React.createElement('div',{style:{fontSize:24}},'📖'),
React.createElement('div',{style:{flex:1}},
React.createElement('div',{style:{fontSize:14,fontWeight:600}},'Continuer la lecture'),
React.createElement('div',{style:{fontSize:12,color:'var(--text3)'}},last.t)
),
React.createElement('span',{style:{color:'var(--text3)',fontSize:18}},'›')
),
React.createElement('div',{onClick:onGoQuiz,style:{display:'flex',alignItems:'center',gap:14,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:16,padding:14,cursor:'pointer'}},
React.createElement('div',{style:{fontSize:24}},'⚡'),

React.createElement('div',{style:{fontSize:14,fontWeight:600}},'Défi Quiz'),
React.createElement('div',{style:{fontSize:12,color:'var(--text3)'}},due.length+' mot'+(due.length>1?'s':'')+' à réviser')
),
React.createElement('span',{style:{color:'var(--text3)',fontSize:18}},'›')
),

React.createElement('div',{style:{position:'relative',width:36,height:36,borderRadius:'50%',background:'conic-gradient(var(--accent) '+(pct*3.6)+'deg,var(--bg5) 0deg)'}},
React.createElement('div',{style:{width:36,height:36,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700}},pct+'%')
),

),

)
),

function Library({onOpen,srs,onGoText,onGoQuizUnit,unitProg}){
const[view,setView]=useState('tree');
const[activeUnit,setActiveUnit]=useState(null);
const[search,setSearch]=useState('');
const[cat,setCat]=useState('all');

const renderRow=w=>{
const c=CATS.find(x=>x.id===w.c);
return React.createElement('div',{key:w.id,className:'word-list-item',onClick:()=>onOpen(w)},
React.createElement('div',{className:'word-list-left'},
React.createElement('div',{style:{width:40,height:40,borderRadius:12,background:(c?.color||'#888')+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}},c?.icon||'📝'),
React.createElement('div',null,
React.createElement('div',{className:'word-french-sm'},w.a),
React.createElement('div',{className:'word-translit-sm'},w.t+' · '+w.r)
)
),
React.createElement('span',{style:{color:'var(--text3)',fontSize:16}},'›')
);
};

if(view==='all'){
const f=V.filter(w=>{
const m=!search||w.a.includes(search)||w.t.toLowerCase().includes(search.toLowerCase())||w.d.toLowerCase().includes(search.toLowerCase());
return m&&(cat==='all'||w.c===cat);
});
return React.createElement('div',null,
React.createElement('div',{style:{padding:'20px 16px 12px'}},
React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
React.createElement('div',{style:{fontSize:26,fontWeight:700}},'Tous les mots'),
React.createElement('button',{onClick:()=>setView('tree'),style:{background:'var(--bg4)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',color:'#fff',fontSize:12,cursor:'pointer'}},'🧗 Parcours')
),
React.createElement('input',{className:'search-bar',placeholder:'Rechercher...',value:search,onChange:e=>setSearch(e.target.value)})
),
React.createElement('div',{className:'chip-row',style:{marginBottom:16}},
React.createElement('div',{className:'chip'+(cat==='all'?' active':''),onClick:()=>setCat('all')},'Tout ('+V.length+')'),
...CATS.map(c=>React.createElement('div',{key:c.id,className:'chip'+(cat===c.id?' active':''),onClick:()=>setCat(c.id)},c.icon+' '+c.label))
),

f.length===0?React.createElement('div',{style:{padding:32,textAlign:'center',color:'var(--text3)'}},'Aucun résultat'):f.map(renderRow)
)

}

if(view==='unit'&&activeUnit){
const u=activeUnit;
const words=getWords(u.words);

function LoadError({onRetry}){
return React.createElement('div',{style:{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center',gap:14}},
React.createElement('div',{style:{fontSize:34}},'⚠️'),
React.createElement('div',{style:{fontSize:15,color:'var(--text2)'}},'Impossible de charger le vocabulaire.'),
React.createElement('button',{onClick:onRetry,style:{background:'var(--accent)',border:'none',borderRadius:12,padding:'12px 20px',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},'Réessayer')
);
}

const root=ReactDOM.createRoot(document.getElementById('root'));

async function loadVocabulary(){
const res=await fetch('./vocabulary.json',{cache:'no-cache'});
if(!res.ok)throw new Error('HTTP '+res.status);
const data=await res.json();
V=data.words||[];
TEXTS=data.texts||[];
CATS=data.categories||[];
PARCOURS=data.parcours||[];
UNITS=data.units||[];
LEVELS=data.levels||[];
}

async function init(){
root.render(React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:14}},'Chargement...'));
try{
await loadVocabulary();
warmUp();
root.render(React.createElement(App));
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
}catch(e){
root.render(React.createElement(LoadError,{onRetry:init}));
}
}

init();
</script>
</body>
</html>
