<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="دارجة">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Darija Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#0C0C0E;--bg3:#1C1C1E;--bg4:#2C2C2E;--bg5:#3A3A3C;
  --text:#FFF;--text2:rgba(255,255,255,.75);--text3:rgba(255,255,255,.4);
  --accent:#5E5CE6;--accent2:#BF5AF2;--gold:#FFD60A;
  --green:#30D158;--red:#FF453A;--blue:#0A84FF;--orange:#FF9F0A;
  --border:rgba(255,255,255,.08);--glass:rgba(255,255,255,.04);
  --radius:20px;--radius-sm:12px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;overflow:hidden;height:100%;overscroll-behavior:none}
#root{height:100%}
.app{max-width:430px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.nav-bar{background:rgba(0,0,0,.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:8px 0 max(20px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;flex-shrink:0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color .2s}
.nav-item.active{color:var(--text)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:500}
.card{background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.word-hero{margin:16px;border-radius:28px;overflow:hidden;position:relative;min-height:200px;background:linear-gradient(145deg,#1a1a2e,#16213e,#0f3460);border:1px solid rgba(94,92,230,.3);cursor:pointer}
.word-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(94,92,230,.3),transparent 70%);border-radius:50%}
.word-hero-content{padding:24px;position:relative;z-index:1}
.word-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(94,92,230,.2);border:1px solid rgba(94,92,230,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#8B8EFF;margin-bottom:14px}
.arabic-text{font-size:38px;font-weight:700;direction:rtl;line-height:1.1;margin-bottom:6px}
.transliteration{font-size:17px;color:var(--text2);font-style:italic;margin-bottom:12px;font-family:'Playfair Display',serif}
.definition-text{font-size:13px;color:var(--text2);line-height:1.5}
.tag{display:inline-flex;align-items:center;background:var(--bg4);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--text2)}
.section{padding:0 16px;margin-bottom:18px}
.section-title{font-size:20px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 16px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:13px;color:var(--text3);font-weight:500}
.detail-value{font-size:13px;color:var(--text);text-align:right;max-width:65%;line-height:1.4}
.example-card{background:var(--bg4);border-radius:14px;padding:14px;margin-bottom:10px;direction:rtl;font-size:15px;line-height:1.6;border-left:3px solid var(--accent)}
.srs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
.srs-btn{border:none;border-radius:14px;padding:14px 8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.srs-btn:active{transform:scale(.95)}
.srs-btn .srs-icon{font-size:20px}
.srs-btn.unknown{background:rgba(255,69,58,.15);color:#FF453A;border:1px solid rgba(255,69,58,.25)}
.srs-btn.medium{background:rgba(255,159,10,.15);color:#FF9F0A;border:1px solid rgba(255,159,10,.25)}
.srs-btn.known{background:rgba(48,209,88,.15);color:#30D158;border:1px solid rgba(48,209,88,.25)}
.progress-bar-bg{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.level-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid currentColor;opacity:.9}
.diff-dots{display:flex;gap:3px}
.diff-dot{width:6px;height:6px;border-radius:50%;background:var(--bg5)}
.diff-dot.filled{background:var(--accent)}
.quiz-option{background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;font-size:14px;transition:all .2s;text-align:right;direction:rtl}
.quiz-option:active{transform:scale(.98)}
.quiz-option.correct{border-color:var(--green);background:rgba(48,209,88,.08);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(255,69,58,.08);color:var(--red)}
.stat-block{flex:1;background:var(--bg3);border-radius:16px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.search-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);width:100%;outline:none}
.search-bar::placeholder{color:var(--text3)}
.immersion-word{background:rgba(94,92,230,.15);border-bottom:1.5px solid var(--accent);cursor:pointer;border-radius:2px}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg3);color:var(--text2);white-space:nowrap}
.chip.active{border-color:var(--accent);background:rgba(94,92,230,.15);color:var(--text)}
.word-list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.word-list-item:active{background:var(--glass)}
.word-list-item:last-child{border-bottom:none}
.word-list-left{display:flex;align-items:center;gap:12px}
.word-arabic-sm{font-size:20px;font-weight:600;direction:rtl}
.word-translit-sm{font-size:12px;color:var(--text3);margin-top:1px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;color:var(--text)}
.word-detail-header{padding:20px 16px 0;display:flex;align-items:center;gap:12px}
.sep{height:1px;background:var(--border);margin:0 16px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
.fade-up{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;animation:fadeUp .3s ease;white-space:nowrap}
.install-tip{margin:12px 16px;background:rgba(94,92,230,.08);border:1px solid rgba(94,92,230,.2);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.6}
.install-tip strong{color:var(--text2)}
</style>
</head>

<script>
const{useState,useEffect,useRef,useCallback}=React;

const VOCABULARY=[{id:1,arabic:"إحباط",transliteration:"i7bat",definition:"Frustration profonde ou découragement suite à un échec répété",nuance:"Plus fort que 'زعفان' — implique un état durable, pas juste un moment de colère. Souvent utilisé en introspection.",register:"Psychologie · Émotionnel",origin:"Fusha → Darija",frequency:"Très courant",difficulty:2,category:"psychologie",synonyms:["خيبة","يأس خفيف"],antonyms:["حماس","تحفيز"],examples:["حسيت بإحباط كبير ملي ما تحققش هاد الشي","الإحباط ما خلاهش يكمل فالمشروع","كيف كتتعامل مع الإحباط ملي الأمور ما تجيش كما بغيتي؟"],errors:"Ne pas confondre avec 'زعفان' (énervé momentanément) — إحباط est plus profond et durable.",level:"riche"},{id:2,arabic:"الوعي الذاتي",transliteration:"l-wa3y dh-dhati",definition:"Conscience de soi, capacité à s'observer et comprendre ses propres émotions",nuance:"Expression phare dans les cercles de développement personnel marocains, podcasts, interviews. Distingue une personne cultivée.",register:"Psychologie · Développement personnel",origin:"Fusha → Darija cultivée",frequency:"Courant dans médias",difficulty:3,category:"psychologie",synonyms:["معرفة الذات","التأمل الداخلي"],antonyms:["الغفلة","عدم الوعي"],examples:["الوعي الذاتي هو أول خطوة باش تتطور","ناس عندهم وعي ذاتي عالي كيعرفو واشبغاو من الحياة","بدونش الوعي الذاتي، كتكرر نفس الأخطاء"],errors:"Éviter de dire juste 'واعي بروحو' dans un contexte soutenu — utiliser l'expression complète.",level:"avancé"},{id:3,arabic:"الغموض",transliteration:"l-ghomud",definition:"L'ambiguïté, le flou, ce qui n'est pas clair ou défini",nuance:"Utilisé dans des contextes intellectuels (art, politique, relations). Plus noble que 'مش واضح'.",register:"Langage soutenu · Débat · Art",origin:"Fusha → Darija intellectuelle",frequency:"Courant chez intellectuels",difficulty:3,category:"pensée critique",synonyms:["اللاوضوح","التضبيب"],antonyms:["الوضوح","الشفافية"],examples:["غموض الرسالة خلى الناس يفسروها بطرق مختلفة","سياسة الغموض ما كتخدمش فالعلاقات","الفن كيشتغل على الغموض والتأويل"],errors:"Ne pas dire 'الغموضية' — la forme correcte est 'الغموض' seulement.",level:"avancé"},{id:4,arabic:"التناقض",transliteration:"t-tanaqud",definition:"La contradiction, deux réalités qui s'opposent dans une même situation ou personne",nuance:"Très utilisé dans les débats marocains et analyses sociales. Implique une tension intellectuelle.",register:"Débat · Philosophie · Société",origin:"Fusha → Darija de débat",frequency:"Fréquent",difficulty:3,category:"débat",synonyms:["التضارب","التعارض"],antonyms:["الانسجام","التوافق"],examples:["كاين تناقض واضح بين كلامو وأفعالو","المجتمع المغربي عيش فالتناقض بين التقليد والحداثة","هاد التناقض هو اللي كيخلق الصراع"],errors:"Ne pas confondre avec 'الاختلاف' (différence simple) — التناقض implique une opposition directe.",level:"riche"},{id:5,arabic:"الهشاشة العاطفية",transliteration:"l-hshasha l-3atifiya",definition:"La vulnérabilité émotionnelle, le fait d'être facilement blessé ou affecté",nuance:"Expression montée en popularité via podcasts psy marocains. Connotation neutre, introspective.",register:"Psychologie · Émotionnel · Intime",origin:"Calque de 'vulnérabilité' → Darija moderne",frequency:"Très courant aujourd'hui",difficulty:3,category:"émotions complexes",synonyms:["الضعف العاطفي","الحساسية الزايدة"],antonyms:["الصلابة العاطفية","الحصانة"],examples:["الهشاشة العاطفية مو عيب، هي علامة إنك إنسان","اعترافو بهشاشته العاطفية ساعدو يتعافى","ملي كتكون هشاش عاطفياً، الكلمات كتأثر فيك بزاف"],errors:"Ne pas traduire littéralement 'هش' comme fragile physiquement — ici le contexte est strictement émotionnel.",level:"avancé"},{id:6,arabic:"الاستحقاق",transliteration:"l-isti7qaq",definition:"Le mérite, le droit moral à quelque chose qu'on a gagné ou mérité",nuance:"Utilisé dans des débats sur la justice sociale, le travail, les droits. Différent de الحق (droit légal).",register:"Société · Justice · Débat",origin:"Fusha → Darija cultivée",frequency:"Courant",difficulty:3,category:"société",synonyms:["الجدارة","الكفاءة"],antonyms:["المحسوبية","الواسطة"],examples:["فلسفة الاستحقاق كتقول إن كل واحد يأخذ على حسب ما خدم","سؤال الاستحقاق مطروح بقوة فالنقاشات الاجتماعية","ما كانش الاستحقاق، كانت الواسطة والمحسوبية"],errors:"Différent de 'التكبر' (arrogance) — الاستحقاق est une revendication légitime.",level:"avancé"},{id:7,arabic:"التردد",transliteration:"t-taraddud",definition:"L'hésitation, l'incapacité à se décider entre deux options",nuance:"Implique un conflit intérieur profond. Utilisé dans des contextes psychologiques et personnels.",register:"Psychologie · Quotidien soutenu",origin:"Fusha → Darija",frequency:"Très fréquent",difficulty:1,category:"psychologie",synonyms:["الشك","عدم الحسم"],antonyms:["الحسم","العزيمة"],examples:["التردد ديالو خلاه يضيع الفرصة","كاين فرق بين التردد الصحي والتردد اللي كيشل","ملي كتكثر التفكير، كيزيد التردد"],errors:"Ne pas confondre avec 'الكسل' (paresse) — التردد est cognitif, pas comportemental.",level:"courant"},{id:8,arabic:"الانتماء",transliteration:"l-intimaa",definition:"Le sentiment d'appartenance à un groupe, une culture, un lieu",nuance:"Mot clé dans les débats identitaires marocains. Très chargé émotionnellement et socialement.",register:"Société · Identité · Émotionnel",origin:"Fusha → Darija cultivée",frequency:"Fréquent",difficulty:2,category:"société",synonyms:["الهوية","الانتساب"],antonyms:["الاغتراب","الانفصال"],examples:["إحساس الانتماء ضروري للصحة النفسية","المغاربة فالخارج كيعيشو أزمة الانتماء","انتماؤه لهاد المدينة كيبان من طريقة حديثو"],errors:"Différent de 'الهوية' (identité) — الانتماء est le sentiment affectif d'appartenance.",level:"riche"},{id:9,arabic:"النخبوية",transliteration:"n-nakhbawiya",definition:"L'élitisme, la mentalité ou comportement d'une élite qui se distingue du commun",nuance:"Souvent péjoratif dans le discours populaire marocain. Employé dans les critiques sociales et politiques.",register:"Critique sociale · Politique · Débat",origin:"Fusha → Darija de presse",frequency:"Courant dans médias",difficulty:4,category:"politique",synonyms:["الاستعلاء","التفوقية الاجتماعية"],antonyms:["الشعبية","التواضع الاجتماعي"],examples:["النخبوية ديالهم ظاهرة في طريقة كلامهم","النقاش الأكاديمي كيطيح فالنخبوية","النخبوية حاجز بين المثقف والمواطن العادي"],errors:"Ne pas confondre avec 'التكبر' (arrogance personnelle) — النخبوية est un phénomène social structurel.",level:"élite"},{id:10,arabic:"الإسقاط النفسي",transliteration:"l-isqat n-nafsi",definition:"La projection psychologique — attribuer à l'autre ses propres sentiments ou défauts",nuance:"Expression technique de psychologie devenue populaire dans les discussions marocaines modernes.",register:"Psychologie · Relations humaines",origin:"Terme technique → Darija éduquée",frequency:"Montant",difficulty:4,category:"psychologie",synonyms:["تحميل الآخر","نسب الصفات للغير"],antonyms:["التأمل الذاتي","المساءلة الذاتية"],examples:["ملي كتنتقد الناس على أشياء فيك، هذا هو الإسقاط النفسي","الإسقاط النفسي آلية دفاع لاوعية","كيف تعرف واش راك كتعمل إسقاطاً نفسياً؟"],errors:"Ne pas utiliser pour décrire une simple accusation — الإسقاط النفسي est inconscient et mécanisme de défense.",level:"élite"},{id:11,arabic:"الطموح المفرط",transliteration:"t-tumu7 l-mufrit",definition:"L'ambition excessive qui dépasse les capacités ou dérègle la vie",nuance:"Expression nuancée — le طموح seul est positif, mais مفرط le transforme en défaut.",register:"Développement personnel · Psychologie",origin:"Darija cultivée",frequency:"Courant",difficulty:2,category:"personnalité",synonyms:["الجشع المهني","التطلع الزائد"],antonyms:["القناعة","التوازن"],examples:["الطموح المفرط كيخلي الواحد ما يستمتعش بما حقق","الفرق بين الطموح والطموح المفرط هو الوعي","طموحه المفرط دمر علاقاته الشخصية"],errors:"Toujours utiliser مفرط pour nuancer — sans lui, طموح seul est positif.",level:"riche"},{id:12,arabic:"التبرير",transliteration:"t-tabreer",definition:"La rationalisation — trouver des justifications à ses comportements pour éviter la culpabilité",nuance:"En psy // ── IMMERSION ──
function ImmersionTab({onOpen}){
  const[active,setActive]=useState(IMMERSION_TEXTS[0]);
  const[toast,setToast]=useState(null);
  const renderText=(text,kws)=>{
    let parts=[{text,isWord:false}];
    kws.forEach(kw=>{
      const np=[];
      parts.forEach(p=>{
        if(p.isWord||!p.text.includes(kw)){np.push(p);return;}
        const idx=p.text.indexOf(kw);
        if(idx>0)np.push({text:p.text.slice(0,idx),isWord:false});
        np.push({text:kw,isWord:true});
        if(idx+kw.length<p.text.length)np.push({text:p.text.slice(idx+kw.length),isWord:false});
      });
      parts=np;
    });
    return parts;
  };
  const tap=word=>{
    const f=VOCABULARY.find(v=>word.includes(v.arabic)||v.arabic.includes(word));
    if(f){setToast('"'+f.arabic+'" → '+f.transliteration);setTimeout(()=>setToast(null),2000);onOpen(f);}
  };
  return React.createElement('div',null,
    toast&&React.createElement('div',{className:'toast'},toast),
    React.createElement('div',{style:{padding:'20px 16px 12px'}},
      React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},'Mode Immersion'),
      React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginTop:4}},'Touchez les mots surlignés')
    ),
    React.createElement('div',{className:'chip-row',style:{marginBottom:16}},
      IMMERSION_TEXTS.map(t=>React.createElement('div',{key:t.id,className:'chip'+(active.id===t.id?' active':''),onClick:()=>setActive(t)},t.title))
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'card'},
        React.createElement('div',{style:{padding:20}},
          React.createElement('div',{style:{fontSize:11,fontWeight:600,color:'var(--text3)',marginBottom:12,textTransform:'uppercase',letterSpacing:1}},active.category.toUpperCase()),
          React.createElement('div',{style:{fontSize:16,lineHeight:1.9,direction:'rtl',color:'var(--text2)'}},
            ...renderText(active.text,active.words).map((p,i)=>
              p.isWord?React.createElement('span',{key:i,className:'immersion-word',onClick:()=>tap(p.text)},p.text):React.createElement('span',{key:i},p.text)
            )
          )
        )
      )
    )
  );
}

// ── QUIZ ──
function QuizTab({srsData,onSRS}){
  const pool=VOCABULARY;
  const[idx,setIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const makeQ=i=>{
    const word=pool[i%pool.length];
    const wrong=pool.filter(w=>w.id!==word.id).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.definition);
    const opts=[word.definition,...wrong].sort(()=>Math.random()-.5);
    return{word,options:opts,correct:word.definition};
  };
  const[q,setQ]=useState(()=>makeQ(0));
  const handle=opt=>{
    if(selected)return;
    setSelected(opt);
    const c=opt===q.correct?'known':'unknown';
    const n={...srsData,[q.word.id]:c};saveSRS(n);onSRS(n);
    setTimeout(()=>{setIdx(p=>p+1);setQ(makeQ(idx+1));setSelected(null);},1200);
  };
  return React.createElement('div',null,
    React.createElement('div',{style:{padding:'20px 16px 8px'}},
      React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},'Quiz'),
      React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginTop:4}},'Question '+(idx+1)+' · '+pool.length+' mots au total')
    ),
    React.createElement('div',{className:'section',style:{marginTop:8}},
      React.createElement('div',{className:'word-hero',style:{cursor:'default',marginBottom:20}},
        React.createElement('div',{className:'word-hero-content'},
          React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}},'QUEL EST LE SENS ?'),
          React.createElement('div',{className:'arabic-text'},q.word.arabic),
          React.createElement('div',{className:'transliteration'},q.word.transliteration),
          React.createElement('div',{style:{marginTop:10}},React.createElement(LevelBadge,{level:q.word.level}))
        )
      ),
      ...q.options.map((opt,i)=>{
        let cls='quiz-option';
        if(selected){if(opt===q.correct)cls+=' correct';else if(opt===selected)cls+=' wrong';}
        return React.createElement('div',{key:i,className:cls,onClick:()=>handle(opt)},opt);
      })
    )
  );
}

      )
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'section-title'},'Par niveau'),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        LEVELS.map(lv=>{
          const lvWords=VOCABULARY.filter(w=>w.level===lv.id);
          const lvKnown=lvWords.filter(w=>srsData[w.id]==='known').length;
          const pct=lvWords.length?Math.round(lvKnown/lvWords.length*100):0;
          return React.createElement('div',{key:lv.id,className:'card'},
            React.createElement('div',{style:{padding:16}},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:10}},
                React.createElement('span',{className:'level-badge',style:{color:lv.color,borderColor:lv.color+'44'}},lv.label),
                React.createElement('span',{style:{fontSize:13,color:'var(--text3)'}},lvKnown+'/'+lvWords.length)
              ),
              React.createElement('div',{className:'progress-bar-bg'},
                React.createElement('div',{className:'progress-bar-fill',style:{width:pct+'%',background:lv.color}})
              )
            )
          );
        })
      )
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'section-title'},'Par thème'),
      React.createElement('div',{className:'card'},
        CATEGORIES.map(cat=>{
          const cw=VOCABULARY.filter(w=>w.category===cat.id);
          if(!cw.length)return null;
          const ck=cw.filter(w=>srsData[w.id]==='known').length;
          return React.createElement('div',{key:cat.id,className:'detail-row'},
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
              React.createElement('span',{style:{fontSize:18}},cat.icon),
              React.createElement('span',{className:'detail-label'},cat.label)
            ),
            React.createElement('div',{style:{textAlign:'right'}},
              React.createElement('div',{style:{fontSize:14,fontWeight:600,color:cat.color}},ck+'/'+cw.length),
              React.createElement('div',{style:{fontSize:11,color:'var(--text3)'}},'maîtrisés')
            )
          );
        })
      )
    ),
    React.createElement('div',{style:{height:20}})
  );
}

// ── APP ──
const TABS=[{id:'home',icon:'⌂',label:'Accueil'},{id:'library',icon:'◫',label:'Mots'},{id:'immersion',icon:'◉',label:'Immersion'},{id:'quiz',icon:'◈',label:'Quiz'},{id:'progress',icon:'▣',label:'Progrès'}];

function App(){
  const[tab,setTab]=useState('home');
  const[word,setWord]=useState(null);
  const[srsData,setSrsData]=useState(loadSRS);
  const[stats,setStats]=useState(()=>{
    const s=loadStats();
    const today=new Date().toDateString();
    if(s.lastDay!==today){
      const y=new Date(Date.now()-86400000).toDateString();
      const streak=s.lastDay===y?(s.streak||0)+1:1;
      const ns={...s,streak,lastDay:today};
      saveStats(ns);return ns;
    }
    return s;
  });
  const scrollRef=useRef(null);
  const go=t=>{setTab(t);setWord(null);scrollRef.current?.scrollTo(0,0)};
  const open=w=>{setWord(w);scrollRef.current?.scrollTo(0,0)};
  const back=()=>{setWord(null);scrollRef.current?.scrollTo(0,0)};
  const updateSRS=n=>{setSrsData(n)};

  let content;
  if(word)content=React.createElement(WordDetail,{word,onBack:back,onSRS:updateSRS,srsData});
  else if(tab==='home')content=React.createElement(HomeTab,{onOpen:open,srsData,stats});
  else if(tab==='library')content=React.createElement(LibraryTab,{onOpen:open,srsData});
  else if(tab==='immersion')content=React.createElement(ImmersionTab,{onOpen:open});
  else if(tab==='quiz')content=React.createElement(QuizTab,{srsData,onSRS:updateSRS});
  else content=React.createElement(ProgressTab,{srsData});

  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'scroll-area',ref:scrollRef},content),
    React.createElement('nav',{className:'nav-bar'},
      TABS.map(t=>React.createElement('button',{key:t.id,className:'nav-item'+(tab===t.id&&!word?' active':''),onClick:()=>go(t.id)},
        React.createElement('span',{className:'nav-icon'},t.icon),
        React.createElement('span',{className:'nav-label'},t.label)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
