<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--bg2:#0C0C0E;--bg3:#1C1C1E;--bg4:#2C2C2E;--bg5:#3A3A3C;--text:#FFF;--text2:rgba(255,255,255,.8);--text3:rgba(255,255,255,.5);--accent:#5E5CE6;--green:#30D158;--red:#FF453A;--orange:#FF9F0A;--border:rgba(255,255,255,.08);--darija:#BF5AF2;--darija-bg:rgba(191,90,242,.12);--arabic:#FFD60A;--arabic-bg:rgba(255,214,10,.1)}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;overflow:hidden;height:100%}
#root{height:100%}
.app{max-width:430px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.nav-bar{background:rgba(0,0,0,.9);backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:10px 0 max(20px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 14px;cursor:pointer;border:none;background:none;color:var(--text3);min-width:56px}
.nav-item.active{color:var(--text)}
.nav-icon{font-size:24px}
.nav-label{font-size:13px;font-weight:600}
.card{background:var(--bg3);border-radius:20px;border:1px solid var(--border);overflow:hidden}
.word-hero{margin:16px;border-radius:28px;overflow:hidden;position:relative;min-height:220px;background:linear-gradient(145deg,#1a1a2e,#16213e,#0f3460);border:1px solid rgba(94,92,230,.3);cursor:pointer}
.word-hero-content{padding:24px}
.word-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(94,92,230,.2);border:1px solid rgba(94,92,230,.4);border-radius:20px;padding:5px 13px;font-size:13px;font-weight:600;color:#8B8EFF;margin-bottom:14px}
.french-word{font-size:48px;font-weight:700;margin-bottom:6px}
.transliteration{font-size:21px;color:var(--text2);font-style:italic;margin-bottom:12px}
.definition-text{font-size:20px;color:var(--text2);line-height:1.6}
.translation-block{background:var(--bg4);border-radius:14px;padding:16px;margin:12px 0;border-left:4px solid var(--arabic)}
.translation-block .trans-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.translation-block .trans-ar{font-size:19px;color:var(--arabic);direction:rtl;text-align:right;font-weight:500}
.translation-block .trans-darija{font-size:19px;color:var(--darija);direction:rtl;text-align:right;margin-top:6px;font-weight:500}
.tag{display:inline-flex;align-items:center;background:var(--bg4);border-radius:8px;padding:5px 11px;font-size:15px;font-weight:500;color:var(--text2)}
.section{padding:0 16px;margin-bottom:18px}
.section-title{font-size:24px;font-weight:700;margin-bottom:14px}
.section-sub{font-size:15px;color:var(--text3);margin-top:-10px;margin-bottom:14px;direction:rtl;text-align:right}
.detail-row{display:flex;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:16px;color:var(--text3)}
.detail-value{font-size:16px;color:var(--text);text-align:left;max-width:65%}
.example-card{background:var(--bg4);border-radius:14px;padding:16px;margin-bottom:10px;font-size:19px;line-height:1.65;border-left:4px solid var(--accent)}
.srs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
.srs-btn{border:none;border-radius:14px;padding:16px 8px;font-size:16px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px}
.srs-btn:active{transform:scale(.95)}
.srs-btn.unknown{background:rgba(255,69,58,.15);color:#FF453A;border:1px solid rgba(255,69,58,.25)}
.srs-btn.medium{background:rgba(255,159,10,.15);color:#FF9F0A;border:1px solid rgba(255,159,10,.25)}
.srs-btn.known{background:rgba(48,209,88,.15);color:#30D158;border:1px solid rgba(48,209,88,.25)}
.progress-bar-bg{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px}
.level-badge{display:inline-flex;padding:4px 11px;border-radius:20px;font-size:14px;font-weight:600;border:1px solid currentColor}
.quiz-option{background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;cursor:pointer;font-size:20px;line-height:1.45;display:flex;align-items:center;gap:14px}
.quiz-option-num{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--bg4);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--text3)}
.quiz-option-text{flex:1}
.quiz-option.correct{border-color:var(--green);background:rgba(48,209,88,.08);color:var(--green)}
.quiz-option.correct .quiz-option-num{background:var(--green);border-color:var(--green);color:#000}
.quiz-option.wrong{border-color:var(--red);background:rgba(255,69,58,.08);color:var(--red)}
.quiz-option.wrong .quiz-option-num{background:var(--red);border-color:var(--red);color:#fff}
.stat-block{flex:1;background:var(--bg3);border-radius:16px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:32px;font-weight:700}
.stat-label{font-size:14px;color:var(--text3)}
.search-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:18px;color:var(--text);width:100%;outline:none}
.search-bar::placeholder{color:var(--text3)}
.immersion-word{background:rgba(94,92,230,.15);border-bottom:1.5px solid var(--accent);cursor:pointer;border-radius:2px;padding:0 2px}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 15px;border-radius:20px;font-size:16px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);white-space:nowrap}
.chip.active{border-color:var(--accent);background:rgba(94,92,230,.15);color:var(--text)}
.word-list-item{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.word-list-item:last-child{border-bottom:none}
.word-list-left{display:flex;align-items:center;gap:12px}
.word-french-sm{font-size:23px;font-weight:600}
.word-translit-sm{font-size:15px;color:var(--text3)}
.back-btn{width:42px;height:42px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text)}
.word-detail-header{padding:20px 16px 0;display:flex;align-items:center;gap:12px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:12px 22px;border-radius:20px;font-size:16px;font-weight:600;z-index:300;max-width:90%;text-align:center}
.install-tip{margin:12px 16px;background:rgba(94,92,230,.08);border:1px solid rgba(94,92,230,.2);border-radius:14px;padding:14px 16px;font-size:15px;color:var(--text3)}
.install-tip strong{color:var(--text2)}
.tip-darija{background:var(--darija-bg);border:2px solid rgba(191,90,242,.3);border-radius:16px;padding:20px 22px;margin:16px 0;font-size:22px;line-height:1.8;color:#E5C9FF;direction:rtl;text-align:right;box-shadow:0 4px 16px rgba(191,90,242,.08)}
.tip-darija .tip-title{font-size:16px;font-weight:700;color:#BF5AF2;text-transform:uppercase;letter-spacing:1px;direction:ltr;text-align:left;margin-bottom:12px}
.tip-darija .tip-example{background:rgba(255,255,255,.06);border-radius:12px;padding:14px 18px;margin-top:12px;font-size:20px;color:#D4BFFF}
.tip-darija .tip-icon{font-size:28px;margin-left:12px;display:inline-block}
.darija-label{font-size:13px;font-weight:700;color:var(--darija);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;direction:ltr;text-align:left}
.quiz-feedback{margin-top:14px;background:var(--darija-bg);border:1px solid rgba(191,90,230,.25);border-radius:14px;padding:14px 16px;font-size:20px;font-weight:600;color:#E5C9FF;direction:rtl;text-align:center}
.mission-card{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:18px;margin:12px 16px}
.mission-step{display:flex;align-items:center;gap:14px;background:var(--bg4);border-radius:14px;padding:14px 16px;cursor:pointer;transition:background .2s}
.mission-step:active{background:var(--bg5)}
.mission-step .step-icon{font-size:24px;flex-shrink:0}
.mission-step .step-content{flex:1}
.mission-step .step-title{font-size:17px;font-weight:600}
.mission-step .step-sub{font-size:15px;color:var(--text3)}
.mission-step .step-arrow{font-size:20px;color:var(--text3)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:17px;color:var(--text2)}
.settings-value{font-size:17px;color:var(--text)}
.size-btn{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.size-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.size-btn:active{transform:scale(.95)}
.consigne-box{background:var(--bg3);border:2px solid var(--accent);border-radius:16px;padding:16px 20px;margin:12px 16px}
.consigne-box .consigne-title{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:6px}
.consigne-box .consigne-text{font-size:18px;color:var(--text2);line-height:1.5}
.consigne-box .consigne-darija{font-size:18px;color:var(--darija);margin-top:8px;direction:rtl;text-align:right}
.next-step-btn{width:100%;background:linear-gradient(135deg,var(--accent),#8B8EFF);border:none;border-radius:14px;padding:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(94,92,230,.35)}
.next-step-btn:active{transform:scale(.97)}
.next-step-sub{font-size:13px;color:var(--text3);text-align:center;margin-top:8px;direction:rtl}
</style>

<body>
<div id="root"></div>
<script>
const{useState,useEffect,useRef,useMemo}=React;

let V=[],TEXTS=[],CATS=[],PARCOURS=[],UNITS=[],LEVELS=[],EXPRESSIONS=[];
const DARIJA_CORRECT=['🎉 صحيح! زين عليك','✅ هاك واحد آخر، نتا ف الطريق الزينة','💪 برافو، كمّل هكا','🔥 واعر! بقى ماشي'];
const DARIJA_WRONG=['💡 ماشي هي، شوف التلميح وكمّل','🔄 ماكاينش مشكل، التكرار كيفهمك مزيان','📚 قريب بزاف، حاول مرة أخرى','🌱 الغلط جزء من التعلم، كمّل بلا ما تقلق'];

function getWord(id){return V.find(w=>w.id===id)}
function getWords(ids){return ids.map(id=>getWord(id)).filter(Boolean)}
function getParcoursWords(p){return V.filter(w=>p.cats.includes(w.c))}
function getUnitForWord(wordId){return UNITS.find(u=>u.words.includes(wordId))}
function getTextForUnit(u){if(!u)return null;const words=getWords(u.words);return TEXTS.find(t=>words.some(w=>t.w.includes(w.a)))}
function getUnitForText(t){if(!t)return null;return UNITS.find(u=>getWords(u.words).some(w=>t.w.includes(w.a)))}
function loadSRS(){try{return JSON.parse(localStorage.getItem('fsrs')||'{}')}catch(e){return{}}}
function saveSRS(s){try{localStorage.setItem('fsrs',JSON.stringify(s))}catch(e){}}
function loadStats(){try{return JSON.parse(localStorage.getItem('fstats')||'{}')}catch(e){return{}}}
function saveStats(s){try{localStorage.setItem('fstats',JSON.stringify(s))}catch(e){}}
function loadUnitProg(){try{return JSON.parse(localStorage.getItem('funits')||'{}')}catch(e){return{}}}
function saveUnitProg(p){try{localStorage.setItem('funits',JSON.stringify(p))}catch(e){}}
function loadFontSize(){try{return localStorage.getItem('ffontsize')||'medium'}catch(e){return'medium'}}
function saveFontSize(s){try{localStorage.setItem('ffontsize',s)}catch(e){}}
function isDue(card){if(!card)return true;return new Date(card.due)<=new Date()}
function dayOfYear(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000)}

function reviewCard(srs,id,q){
const prev=srs[id]||{ease:2.5,interval:0,reps:0,due:new Date().toISOString()};
let{ease:e,interval,reps}=prev;
if(q===0){reps=0;interval=1;e=Math.max(1.3,e-0.25)}
else if(q===1){reps=reps+1;interval=reps<=1?1:Math.max(1,Math.round(interval*1.2));e=Math.max(1.3,e-0.05)}
else{reps=reps+1;interval=reps<=1?3:Math.round(interval*e);e=Math.min(2.8,e+0.1)}
const due=new Date(Date.now()+interval*86400000).toISOString();
const status=q===0?'unknown':q===1?'medium':'known';
return{...srs,[id]:{ease:e,interval,reps,due,status,lastReview:new Date().toISOString()}};
}

// ==== Rappels d'exercice (Web Push) ====
// ⚠️ Remplace ces deux valeurs par les tiennes après le déploiement du serveur (voir GUIDE.md)
const PUSH_SERVER_URL='https://francais-elevate-push.fe7k2m9xq.workers.dev';
const VAPID_PUBLIC_KEY='BNtafhmvhHCVzbrSmySWz5K-RlOEXMDQqqNga2pxXCvbQN4Piv64j9s-eYzXBZ9WfvgiWGtl_K7G3drZZxp_5zM';

function urlBase64ToUint8Array(base64String){
const padding='='.repeat((4-base64String.length%4)%4);
const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
const rawData=atob(base64);
const outputArray=new Uint8Array(rawData.length);
for(let i=0;i<rawData.length;++i)outputArray[i]=rawData.charCodeAt(i);
return outputArray;
}

function isStandaloneApp(){
try{return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true}catch(e){return false}
}

async function getPushSubscription(){
try{
if(!('serviceWorker' in navigator)||!('PushManager' in window))return null;
const reg=await navigator.serviceWorker.ready;
return await reg.pushManager.getSubscription();
}catch(e){return null}
}

async function subscribeToPush(){
if(!('serviceWorker' in navigator)||!('PushManager' in window))throw new Error('unsupported');
if(!isStandaloneApp())throw new Error('not-installed');
const perm=await Notification.requestPermission();
if(perm!=='granted')throw new Error('denied');
const reg=await navigator.serviceWorker.ready;
const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});
const res=await fetch(PUSH_SERVER_URL+'/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(sub)});
if(!res.ok)throw new Error('server-error');
return true;
}

async function unsubscribeFromPush(){
const sub=await getPushSubscription();
if(sub){
try{await fetch(PUSH_SERVER_URL+'/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:sub.endpoint})})}catch(e){}
await sub.unsubscribe();
}
}

let voices=[];
function speak(text){try{if(!window.speechSynthesis)return;const synth=window.speechSynthesis;synth.cancel();const v=voices.length?voices:synth.getVoices();const u=new SpeechSynthesisUtterance(text);const f=v.find(v=>v.lang&&v.lang.toLowerCase().startsWith('fr'));if(f)u.voice=f;u.lang='fr-FR';u.rate=.85;synth.speak(u)}catch(e){}}
function warmUp(){try{if(!window.speechSynthesis)return;const synth=window.speechSynthesis;const grab=()=>{const v=synth.getVoices();if(v&&v.length)voices=v};grab();synth.addEventListener('voiceschanged',grab)}catch(e){}}

function LevelBadge({level}){const f=LEVELS.find(l=>l.id===level)||LEVELS[0];return React.createElement('span',{className:'level-badge',style:{color:f.color,borderColor:f.color+'44'}},f.label)}

function TipDarija({title,children,example}){
return React.createElement('div',{className:'tip-darija'},
React.createElement('div',{className:'tip-title'},React.createElement('span',{className:'tip-icon'},'💡'),' ',title||'نصيحة بالدارجة'),
children,
example&&React.createElement('div',{className:'tip-example'},'📖 '+example)
);
}

function Consigne({text,darija}){
return React.createElement('div',{className:'consigne-box'},
React.createElement('div',{className:'consigne-title'},'📝 CONSIGNE'),
React.createElement('div',{className:'consigne-text'},text),
React.createElement('div',{className:'consigne-darija'},'💡 '+darija)
);
}

function WordDetail({word,onBack,onSRS,srs,onGoText,onGoQuizUnit,fontSize}){
const[showAll,setShowAll]=useState(false);
const card=srs[word.id]||null;
const[chosen,setChosen]=useState(card?card.status:null);
const handle=q=>{const c=q===0?'unknown':q===1?'medium':'known';setChosen(c);const n=reviewCard(srs,word.id,q);saveSRS(n);setTimeout(()=>onSRS(n),200)};
const ctx=TEXTS.filter(t=>t.w.includes(word.a));
const expr=EXPRESSIONS.filter(e=>e.unit===word.unit||!e.unit);
const style=fontSize?{fontSize:fontSize+'px'}:{};
const parentUnit=getUnitForWord(word.id);
const unitText=getTextForUnit(parentUnit);
return React.createElement('div',{style:{paddingBottom:20}},
React.createElement('div',{className:'word-detail-header'},
React.createElement('button',{className:'back-btn',onClick:onBack},'←'),
React.createElement('span',{style:{fontSize:14,color:'var(--text3)'}},'Détail')
),
React.createElement('div',{className:'word-hero',style:{cursor:'default',marginTop:16}},
React.createElement('div',{className:'word-hero-content'},
React.createElement('div',{style:{display:'flex',justifyContent:'space-between'}},
React.createElement('div',{className:'word-badge'},React.createElement('span',{className:'dot-live'}),word.r),
React.createElement('button',{onClick:()=>speak(word.a),style:{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:'50%',width:38,height:38,fontSize:16,color:'#fff',cursor:'pointer'}},'🔊')
),
React.createElement('div',{className:'french-word',style:style},word.a),
React.createElement('div',{className:'transliteration'},word.t),
React.createElement('div',{className:'definition-text',style:style},word.d)
)
),
(word.ar||word.darija)&&React.createElement('div',{className:'section'},
React.createElement('div',{className:'translation-block'},
React.createElement('div',{className:'trans-title'},'🌍 TRADUCTION'),
word.ar&&React.createElement('div',{className:'trans-ar'},'العربية الفصحى : '+word.ar),
word.darija&&React.createElement('div',{className:'trans-darija'},'الدارجة المغربية : '+word.darija)
)
),
ctx.length>0&&React.createElement('div',{style:{padding:'0 16px 16px'}},
React.createElement('button',{onClick:()=>onGoText(ctx[0].id),style:{width:'100%',background:'rgba(94,92,230,.15)',border:'1px solid rgba(94,92,230,.4)',borderRadius:12,padding:'12px',color:'#A8A6FF',fontSize:15,fontWeight:600,cursor:'pointer'}},'📖 Voir en contexte — '+ctx[0].t)
),
React.createElement('div',{style:{display:'flex',gap:8,padding:'0 16px 16px',flexWrap:'wrap'}},
React.createElement(LevelBadge,{level:word.l}),
React.createElement('span',{className:'tag'},'🌍 '+word.o),
React.createElement('span',{className:'tag'},'📊 '+word.f),
card&&React.createElement('span',{className:'tag'},'⏳ révision '+new Date(card.due).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}))
),
word.tip&&React.createElement('div',{className:'section'},
React.createElement(TipDarija,{title:'نصيحة لفهم الكلمة',example:word.tipExample},word.tip)
),
React.createElement('div',{className:'section'},
React.createElement('div',{className:'card'},
React.createElement('div',{style:{padding:16}},
React.createElement('div',{style:{fontSize:14,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'NUANCE'),
React.createElement('div',{style:{fontSize:19,color:'var(--text2)',lineHeight:1.5}},word.n)
)
),
word.glose&&React.createElement('div',{className:'section'},
React.createElement(TipDarija,{title:'بالدارجة — شرح الكلمة'},word.glose)
)
),
React.createElement('div',{className:'section'},
React.createElement('div',{className:'card'},

root.render(React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:14}},'Chargement...'));
try{
await loadVocabulary();
warmUp();
root.render(React.createElement(App));
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
}catch(e){

}
}

init();
</script>
